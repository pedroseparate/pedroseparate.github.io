function setBlockZone(uid, bi, zoneId) {
  const item=findItem(uid); if(!item) return;
  item.blocks[bi].zone=zoneId;
  const newReps=zoneToReps(zoneId);
  item.blocks[bi].reps=newReps;
  // Auto-fill kg from RM estimate
  const {kg: suggestedKg} = suggestKgForZone(item.ex.id, zoneId);
  if(suggestedKg > 0) item.blocks[bi].kg = suggestedKg;
  const repsEl=document.getElementById(`reps-${uid}-${bi}`);
  if(repsEl) repsEl.value=newReps;
  const kgEl=document.getElementById(`kg-${uid}-${bi}`);
  if(kgEl && suggestedKg > 0) { kgEl.value=suggestedKg; kgEl.style.color='var(--copper)'; setTimeout(()=>{kgEl.style.color='';},1200); }
  // Update zone segs
  const blockEl=document.getElementById(`block-${uid}-${bi}`);
  if(blockEl){
    blockEl.querySelectorAll('.zone-seg').forEach((el,i)=>{
      const z=ZONES[i];
      const active=z.id===zoneId;
      el.classList.toggle('on',active);
      const colorMap={leve:'#608040',moderado:'#a07040',pesado:'#8a6030',maximo:'#6a3020'};
      el.style.background=active?colorMap[z.id]:'';
      el.style.color=active?'#fff':'';
    });
    const zonePctEl=blockEl.querySelector('.zone-segs > div:last-child');
    if(zonePctEl) zonePctEl.textContent=ZONES.find(z=>z.id===zoneId)?.pct||'';
  }
  renderAnalysis();
}

function updateBlockReps(uid, bi, val) {
  const item=findItem(uid); if(!item) return;
  const r=parseInt(val)||10;
  item.blocks[bi].reps=r;
  const derivedZone=repsToZone(r);
  if(derivedZone!==item.blocks[bi].zone){
    item.blocks[bi].zone=derivedZone;
    // Update zone UI without full re-render
    const blockEl=document.getElementById(`block-${uid}-${bi}`);
    if(blockEl){
      blockEl.querySelectorAll('.zone-seg').forEach((el,i)=>{
        const z=ZONES[i];const active=z.id===derivedZone;
        el.classList.toggle('on',active);
        const colorMap={leve:'#608040',moderado:'#a07040',pesado:'#8a6030',maximo:'#6a3020'};
        el.style.background=active?colorMap[z.id]:'';el.style.color=active?'#fff':'';
      });
      const zonePctEl=blockEl.querySelector('.zone-segs > div:last-child');
      if(zonePctEl) zonePctEl.textContent=ZONES.find(z=>z.id===derivedZone)?.pct||'';
    }
  }
  renderAnalysis();
}

function updateBlock(uid, bi, field, val) {
  const item=findItem(uid); if(!item) return;
  item.blocks[bi][field]=parseFloat(val)||0;

}

function addBlock(uid) {
  const item=findItem(uid); if(!item) return;
  item.blocks.push({stypeId:'backoff',zone:'leve',sets:2,reps:14,kg:0,pse:7});
  const cardEl=document.getElementById(`card-${uid}`);

function removeBlock(uid, bi) {
  const item=findItem(uid); if(!item) return;
  item.blocks.splice(bi,1);

  if(cardEl){ const newCard=buildExCard(item); cardEl.replaceWith(newCard); }
  renderAfterItemChange(uid);

function removeEx(uid) {
  if(isMesoItem(uid)){
    for(const t of Object.keys(mesoState.sessoes||{})){
      const idx=(mesoState.sessoes[t]||[]).findIndex(w=>w && w.uid===uid);
      if(idx>-1){mesoState.sessoes[t].splice(idx,1);break;}
    }
    renderMcExList(); renderMcBuild(); renderMcAnalysis();
  } else {
    workoutItems=workoutItems.filter(w=>w.uid!==uid);
    renderBuild(); renderAnalysis(); renderExList();
  }
}

// ═══════════════════════════════════════════════════════
// ANALYSIS PANEL
// ═══════════════════════════════════════════════════════
function calcItemIndex(item) {
  const sc=SCENARIOS.find(s=>s.id===currentScenarioId);
  let N=0,M=0,Met=0;
  item.blocks.forEach(block=>{
    const usedKg=block.kg||20;
    const FTT=stypeToFTT(block.stypeId);
    const cn=usedKg*block.reps*block.sets*item.ex.FC;
    N+=cn*item.ex.DN*(1+item.ex.CT*.05+item.ex.SV*item.ex.explos*.05);
    M+=cn*item.ex.IM;
    Met+=cn*FTT*item.ex.SV;
  });
  const co=sc.wN*N+sc.wM*M+sc.wMet*Met;
  return{N,M,Met,co};
}

function calcSessionTotal() {
  let N=0,M=0,Met=0,co=0;
  workoutItems.forEach(item=>{
    const r=calcItemIndex(item);N+=r.N;M+=r.M;Met+=r.Met;co+=r.co;
  });
  return{N,M,Met,co};
}

function renderAnalysis(radarOnly=false) {
  const anBody=document.getElementById('an-body');
  const sc=SCENARIOS.find(s=>s.id===currentScenarioId);
  const {N,M,Met,co}=calcSessionTotal();
  const maxComp=Math.max(N,M,Met)||1;
  const student=STUDENTS['slv']; // always targeting Soares LV
  const indices=student.sessIndices;
  const mean=indices.reduce((a,b)=>a+b,0)/indices.length;
  const maint=mean*0.78;
  const overload=mean*1.28;
  // Score-09 decompose
  const coInt=Math.floor(co/1000);
  const coDec=co>0?String(Math.round(co)).padStart(4,'0').slice(-3):'—';
  // Verdict
  let verdictText='', verdictColor='rgba(200,160,96,0.5)';
  if(co===0){ verdictText='Adicione exercícios para calcular o índice.'; }
  else if(co<maint){ verdictText=`<strong>Abaixo da manutenção</strong> (ref. ${maint.toFixed(0)}). Válido para recuperação ativa.`; verdictColor='rgba(106,128,64,0.7)'; }
  else if(co<=overload){ const pct=((co-mean)/mean*100); verdictText=`<strong>${pct>=0?'+':''}${pct.toFixed(0)}% vs média</strong> (${mean.toFixed(0)}). Dentro da zona produtiva.`; verdictColor='rgba(200,160,96,0.65)'; }
  else { verdictText=`<strong>Sobrecarga planejada</strong> — +${((co-mean)/mean*100).toFixed(0)}% vs média. Monitorar Ritmo na semana seguinte.`; verdictColor='rgba(200,120,64,0.7)'; }
  // Marker position

// ─── RADAR ───────────────────────────────────────────
function drawRadar(canvas, series) {
  const ctx=canvas.getContext('2d');
  const W=canvas.width,H=canvas.height,cx=W/2,cy=H/2,R=Math.min(W,H)/2-26;
  const N=5;
  ctx.clearRect(0,0,W,H);
  for(let ring=1;ring<=5;ring++){
    ctx.beginPath();
    for(let i=0;i<N;i++){const a=(i/N)*Math.PI*2-Math.PI/2,r=R*ring/5;i===0?ctx.moveTo(cx+r*Math.cos(a),cy+r*Math.sin(a)):ctx.lineTo(cx+r*Math.cos(a),cy+r*Math.sin(a));}
    ctx.closePath();ctx.strokeStyle='rgba(200,160,96,0.07)';ctx.lineWidth=1;ctx.stroke();
  }
  for(let i=0;i<N;i++){
    const a=(i/N)*Math.PI*2-Math.PI/2;
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+R*Math.cos(a),cy+R*Math.sin(a));
    ctx.strokeStyle='rgba(200,160,96,0.08)';ctx.lineWidth=1;ctx.stroke();
  }
  series.forEach(s=>{
    ctx.globalAlpha=s.opacity||1;
    ctx.beginPath();
    for(let i=0;i<N;i++){const a=(i/N)*Math.PI*2-Math.PI/2,r=R*s.vals[i]/10;i===0?ctx.moveTo(cx+r*Math.cos(a),cy+r*Math.sin(a)):ctx.lineTo(cx+r*Math.cos(a),cy+r*Math.sin(a));}
    ctx.closePath();ctx.fillStyle=s.color+'18';ctx.fill();ctx.strokeStyle=s.color;ctx.lineWidth=1.5;ctx.stroke();
    for(let i=0;i<N;i++){const a=(i/N)*Math.PI*2-Math.PI/2,r=R*s.vals[i]/10;ctx.beginPath();ctx.arc(cx+r*Math.cos(a),cy+r*Math.sin(a),2.5,0,Math.PI*2);ctx.fillStyle=s.color;ctx.fill();}
    if(s.label){ctx.globalAlpha=1;ctx.font='500 8px IBM Plex Mono,monospace';ctx.textAlign='center';ctx.fillStyle='rgba(224,188,128,0.8)';ctx.fillText(s.label,cx,cy+R+22);}
    ctx.globalAlpha=1;
  });
  const labels=['Neural','Mecân.','Metab.','Técn.','Ritmo'];
  ctx.font='400 8px IBM Plex Mono,monospace';ctx.textAlign='center';
  for(let i=0;i<N;i++){
    const a=(i/N)*Math.PI*2-Math.PI/2,lr=R+16;
    ctx.fillStyle='rgba(200,160,96,0.3)';
    ctx.fillText(labels[i],cx+lr*Math.cos(a),cy+lr*Math.sin(a)+3);
  }
}

function mesoForStudent(sid) {
  currentStudentId = sid;
  mesoState.studentId = sid;
  // pre-fill from anamnese
  const s = STUDENTS[sid];
  if(s.anamnese) {
    mesoState.diasSemana = parseInt(s.anamnese.disponibilidade) || 3;
    mesoState.objetivo = s.anamnese.objetivo || '';
  }
  navTo('mesociclo');
}

function suggestDivisao(sid) {
  const s = STUDENTS[sid];
  const a = s.anamnese || {};
  const nivel = (s.nivel || '').toLowerCase();
  const dias = mesoState.diasSemana;
  const restricoes = (a.restricoes || '').toLowerCase();
  const objetivo = (a.objetivo || '').toLowerCase();

  return DIVISOES.map(d => {
    let score = 0; let reasons = []; let warns = [];
    // dias match
    const daysOk = dias >= d.minDays && dias <= d.maxDays;
    if(!daysOk) { warns.push(`Requer ${d.minDays}–${d.maxDays} dias/sem (você tem ${dias})`); score -= 10; }
    else score += 3;
    // nivel match
    const nivelMatch = d.bestFor.some(bf => nivel.includes(bf.toLowerCase()));
    if(nivelMatch) { score += 4; reasons.push(`Indicado para ${s.nivel}`); }
    // objetivo
    if(objetivo.includes('hiper') && ['upperlower','ppl','agonista'].includes(d.id)) { score += 3; reasons.push('Alinha com objetivo hipertrofia'); }
    if(objetivo.includes('força') && ['ppl','dup','torso_membros'].includes(d.id)) { score += 3; reasons.push('Boa frequência para ganho de força'); }
    if(objetivo.includes('funcional') || objetivo.includes('atlét')) {
      if(['torso_membros','ppl'].includes(d.id)) { score += 3; reasons.push('Padrões atléticos bem distribuídos'); }
    }
    if(objetivo.includes('reabili') || objetivo.includes('recuper')) {
      if(['fullbody','corpo_todo_2'].includes(d.id)) { score += 4; reasons.push('Baixa densidade ideal para reabilitação'); }
    }
    // restricoes
    if(restricoes.includes('joelho') || restricoes.includes('lombar')) {
      if(d.id === 'ppl') warns.push('Dia de Legs intenso — monitorar restrição');
    }
    // dias < 3
    if(dias <= 2 && d.id !== 'corpo_todo_2') score -= 5;
    if(dias >= 5 && d.id === 'fullbody') { warns.push('5+ dias de full body gera overtraining'); score -= 6; }
    return {...d, score, reasons, warns, compatible: daysOk};
  }).sort((a,b) => b.score - a.score);
}

      <div class="mc-panel ${mesoState.step===3?'active':''}" id="mc-p3" style="padding:0;display:${mesoState.step===3?'flex':'none'};flex-direction:column;"></div>
      <div class="mc-panel ${mesoState.step===4?'active':''}" id="mc-p4"></div>
    </div>
    <div class="mc-nav">
      <div class="mc-nav-info" id="mc-nav-info"></div>
      <div style="display:flex;gap:6px">
        <button class="btn-sm" id="mc-back" onclick="mesoBack()">← Voltar</button>
        <button class="btn-sm pri" id="mc-next" onclick="mesoNext()">Próximo →</button>
      </div>
    </div>
  `;
  renderMesoStep();
}

function goMesoStep(n) {
  if(n > mesoState.step) return; // só volta
  mesoState.step = n;
  renderMesociclo();
}

function renderMesoStep() {
  if(mesoState.step===1) renderMesoStep1();
  if(mesoState.step===2) renderMesoStep2();
  if(mesoState.step===3) renderMesoStep3();
  if(mesoState.step===4) renderMesoStep4();
  // nav buttons
  document.getElementById('mc-back').style.display = mesoState.step>1?'':'none';
  const nextBtn = document.getElementById('mc-next');
  if(mesoState.step===4) { nextBtn.textContent='✓ Salvar Mesociclo'; nextBtn.onclick=saveMesociclo; }
  else { nextBtn.textContent='Próximo →'; nextBtn.onclick=mesoNext; }
  document.getElementById('mc-nav-info').textContent = `Etapa ${mesoState.step} de 4`;
}

  const div = DIVISOES.find(d=>d.id===id);
  if(div) {
    const tipos = [...new Set(div.pattern.filter(t=>t!=='Descanso'))];
    tipos.forEach(t => { if(!mesoState.sessoes[t]) mesoState.sessoes[t] = []; });

  const grid = document.getElementById('mc-week-preview');
  if(!grid) return;
  grid.innerHTML = dias.map((d,i)=>{

    const isTreino = tipo !== 'Descanso';
    return `<div class="mc-week-cell ${isTreino?'treino':'descanso'}">

function renderMcExList() {
  const el = document.getElementById('mc-ex-list');

    return `<div class="mc-ex-item ${added?'added':''}" onclick="mcAddEx('${e.id}')">

function mcAddEx(exId) {
  const t = mesoState.activeSessao;
  if(!mesoState.sessoes[t]) mesoState.sessoes[t] = [];
  if(mesoState.sessoes[t].find(w=>w.ex && w.ex.id===exId)) return;
  const ex = EXERCISES.find(e=>e.id===exId);
  // RN30-aware default stype based on modelo + sessão
  const stypeByModelo = {
    linear:'hipertrofia',
    block: t.includes('Força')?'forca_max':t.includes('Volume')?'resistencia':'hipertrofia',
    dup:   t.includes('Força')?'forca_max':t.includes('Volume')?'resistencia':t.includes('Hiper')?'hipertrofia':'hipertrofia',
    conjugado:'hipertrofia'
  };
  let defStype = stypeByModelo[mesoState.modelo] || 'hipertrofia';
  if(getStypeValidation(ex, defStype).status==='locked'){
    defStype = SERIES_TYPES.find(st=>getStypeValidation(ex,st.id).status!=='locked')?.id || 'hipertrofia';
  }
  const st = SERIES_TYPES.find(s=>s.id===defStype);
  const {kg: suggestedKg} = suggestKgForZone(exId, st.zone);
  mesoState.sessoes[t].push({
    uid: newUID(), ex,
    blocks:[{stypeId:defStype, zone:st.zone, sets:3, reps:st.reps_def, kg:suggestedKg, pse:8}],
    overrideModelo:false, overrideReason:''
  });
  renderMcExList();
  renderMcBuild();
  renderMcAnalysis();
}

  mesoState.sessoes[t].splice(idx,1);

  const progLabels = {linear:'Linear +2.5kg/sem',block:'Blocos acum→int→real',dup:'DUP — zona por dia',conjugado:'Conjugado — variação semanal'};
  items.forEach((item, i) => {

function mcSetVal(t, i, key, val) {
  if(mesoState.sessoes[t] && mesoState.sessoes[t][i]) mesoState.sessoes[t][i][key] = val;
}

function mcToggleOverride(t, i, val) {
  if(mesoState.sessoes[t] && mesoState.sessoes[t][i]) mesoState.sessoes[t][i].overrideModelo = val;
  renderMcBuild();
}



function renderMcAnalysis() {
  const el = document.getElementById('mc-an-panel');
  if(!el) return;
  const t = mesoState.activeSessao;
  const items = (mesoState.sessoes[t]||[]).filter(w=>w && w.uid && w.ex);

  // estimate session IC and dimensions from new format
  let totalN=0, totalM=0, totalMet=0, totalIC=0;
  items.forEach(item=>{
    const ex = item.ex; if(!ex) return;
    item.blocks.forEach(block=>{
      const kg = block.kg||20;
      const ic = kg * block.sets * block.reps * ex.FC * (1 + ex.CT/20 + ex.DN/20);
      totalN   += ic * (ex.DN/10) * (1 + ex.CT/20);
      totalM   += ic * (ex.IM/10) * (1 + ex.SV/20);
      totalMet += ic * (1 - ex.DN/20 - ex.IM/20);
      totalIC  += ic;
    });
  });
  const mx = Math.max(totalN,totalM,totalMet)||1;

  // IC projection over weeks
  const semanas = mesoState.semanas;
  const baseIC = totalIC||1000;
  const projWeeks = Array.from({length:semanas},(_, i)=>{
    let mult;
    if(mesoState.modelo==='linear') mult = 1 + i*0.04;
    else if(mesoState.modelo==='block') {
      const phase = Math.floor(i/(semanas/3));
      mult = [1+i*0.03, 1.1+i*0.025, 1.22+i*0.015][phase]||1;
    } else mult = 1 + i*0.035 + (i%2===0?0:0.02);
    if((i+1)%4===0 && i<semanas-1) mult*=0.75;
    return Math.round(baseIC*mult);
  });
  const maxProj = Math.max(...projWeeks)||1;

  el.innerHTML = `
    <div class="mc-an-lbl">Radar da Sessão</div>
    <div class="mc-an-radar-wrap">
      <canvas class="mc-an-radar" id="mc-an-radar-canvas" width="220" height="220"></canvas>
    </div>
    ${items.length===0?`<div style="font-size:8px;color:rgba(200,160,96,.3);text-align:center;padding:12px">Adicione exercícios</div>`:''}
    ${items.length>0?`
    <div class="mc-an-lbl">Perfil Dimensional</div>
    <div style="margin-bottom:14px">
      ${[['Neural',totalN,mx,'#8a6030'],['Mecânica',totalM,mx,'#a07040'],['Metabólica',totalMet,mx,'#608040']].map(([lbl,v,m,c])=>`
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:6px">
        <div style="font-size:7px;color:rgba(200,160,96,.4);width:54px;text-transform:uppercase;letter-spacing:.08em">${lbl}</div>
        <div style="flex:1;height:3px;background:rgba(200,160,96,.06);overflow:hidden">
          <div style="width:${(v/m*100).toFixed(0)}%;height:100%;background:${c};transition:width .3s"></div>
        </div>
        <div style="font-size:8px;color:rgba(200,160,96,.5);font-style:italic;width:28px;text-align:right">${(v/m*100).toFixed(0)}</div>
      </div>`).join('')}
    </div>
    <div class="mc-an-lbl">IC Estimado · S1</div>
    <div style="font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:600;font-size:28px;color:rgba(200,160,96,.8);text-align:center;margin-bottom:12px">${Math.round(totalIC).toLocaleString('pt-BR')}</div>

    <div class="mc-an-lbl">Projeção Sessão · ${semanas} semanas</div>
    <div class="proj-svg-wrap" style="margin-bottom:16px">
      ${buildSvgLineChart([
        {label:'', color:'rgba(200,160,96,.8)', values:projWeeks}
      ], semanas)}
    </div>

    ${items.length>1?`
    <div class="mc-an-lbl">Projeção por Exercício</div>
    <div class="proj-svg-wrap" style="margin-bottom:16px">
      ${(()=>{
        const colors=['#c8a060','#a07040','#608040','#407080','#804060','#806040','#406060'];
        const exSeries = items.map((item,i)=>{
          const exBaseIC = item.blocks.reduce((s,b)=>{
            const kg=b.kg||20;
            return s + kg*b.sets*b.reps*item.ex.FC*(1+item.ex.CT/20+item.ex.DN/20);
          },0);
          return {
            label: item.ex.name.split(' ')[0],
            color: colors[i%colors.length],
            values: projICWeeks(exBaseIC, mesoState.modelo, semanas)
          };
        });
        return buildSvgLineChart(exSeries, semanas, 88);
      })()}
    </div>`:``}

function openSessDetail(sid, wi, si) {

    // Simulate per-series data

            </div>
            <div class="sd-ex-body">
              <table class="sd-series-table">
                <thead><tr><th>Série</th><th>Carga</th><th>Reps</th><th>PSE</th><th>Esforço</th></tr></thead>
                <tbody>
                  ${series.map((sr, si) => `

                    <td class="sd-series-num">${si+1}</td>

                    <td style="color:${sr.pse>=8.5?'#c86030':sr.pse>=7?'#a07040':'#608040'}">${sr.pse}</td>

                </tbody>
              </table>
              ${ex?`

        </div>`).join('')}

        <div class="sd-aside-lbl" style="margin-top:14px">Músculos</div>
        ${(()=>{
          const mc={};
          exCards.forEach(({ex})=>ex&&ex.muscles&&ex.muscles.forEach(m=>{mc[m]=(mc[m]||0)+1;}));
          const sorted=Object.entries(mc).sort((a,b)=>b[1]-a[1]);
          const max=sorted[0]?.[1]||1;
          return sorted.slice(0,6).map(([m,c])=>`
          <div style="display:flex;align-items:center;gap:5px;margin-bottom:5px">
            <div style="font-size:7px;color:rgba(200,160,96,.45);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${m}</div>
            <div style="width:60px;height:2px;background:rgba(200,160,96,.07)">

        })()}

  document.getElementById('sd-overlay').classList.remove('hidden');

  const radarVals = [
    Math.min(sess.n * 10, 10),

    Math.min(sess.met * 10, 10),

    Math.min(totalIC / mean * 5, 10)
  ];
  window._sdRadarBase = radarVals;
  window._sdExCards = exCards;

function sdHoverEx(idx) {
  const canvas = document.getElementById('sd-radar');
  const tip = document.getElementById('sd-radar-tip');
  if(!canvas || !window._sdRadarBase) return;
  document.querySelectorAll('.sd-ex-card').forEach((el,i) => {
    el.classList.toggle('hovered', idx >= 0 && i === idx);
  });
  if(idx < 0) {
    drawRadar(canvas, [{vals: window._sdRadarBase, color:'#c8a060'}]);
    if(tip) tip.textContent = '';
    return;
  }
  const card = window._sdExCards[idx];
  if(!card || !card.ex) return;
  const ex = card.ex;
  const ic = card.ic || 0;
  const exVals = [
    Math.min(ex.DN, 10),
    Math.min(ex.IM, 10),
    Math.min(ex.SV / 1.2, 10),
    Math.min(ex.CT, 10),
    Math.min(ic / (window._sdSessIC / 5 || 1), 10)
  ];
  drawRadar(canvas, [
    {vals: window._sdRadarBase, color:'rgba(200,160,96,.2)'},
    {vals: exVals, color:'#c86030'}
  ]);
  if(tip) tip.textContent = card.e.nome;
}

    'Mecânica': `<strong>Dimensão Mecânica</strong>Tensão muscular, dano estrutural e estímulo de hipertrofia — quanto "rasgou" de fibra nesta sessão.<br><br><b>${(val*100).toFixed(0)}%</b> da carga total foi mecânica.<br>${val > 0.42 ? '⚠ Alta — priorize proteína e 48–72h antes de treinar o mesmo grupo.' : '✓ Moderado — favorece hipertrofia sem sobrecarga excessiva.'}`,

// MESO STEP 3 — RADAR + PROJECTION CHARTS

let mcHoveredUid = null;

function buildSvgLineChart(series, weeks, h=72, w=220) {
  // series: [{label, color, values: []}]
  const allVals = series.flatMap(s=>s.values);
  const maxV = Math.max(...allVals)||1;
  const minV = 0;
  const padL=8, padR=8, padT=14, padB=18;
  const cW=w-padL-padR, cH=h-padT-padB;
  let svg = `<svg viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg" style="overflow:visible">`;
  // grid lines
  for(let g=0;g<=4;g++){
    const y=padT+cH*(1-g/4);
    svg+=`<line x1="${padL}" y1="${y}" x2="${padL+cW}" y2="${y}" stroke="rgba(200,160,96,.06)" stroke-width="1"/>`;
  }
  // series
  series.forEach(s=>{
    const pts = s.values.map((v,i)=>{
      const x = padL + (i/(weeks-1))*cW;
      const y = padT + cH*(1-(v-minV)/(maxV-minV));
      return `${x.toFixed(1)},${y.toFixed(1)}`;
    });
    svg+=`<polyline points="${pts.join(' ')}" fill="none" stroke="${s.color}" stroke-width="1.5" opacity="${s.opacity||1}"/>`;
    // dots
    s.values.forEach((v,i)=>{
      const x = padL + (i/(weeks-1))*cW;
      const y = padT + cH*(1-(v-minV)/(maxV-minV));
      const isDeload = (i+1)%4===0 && i<weeks-1;
      svg+=`<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="${isDeload?'2':'2.5'}" fill="${isDeload?'rgba(200,160,96,.2)':s.color}" opacity="${isDeload?.4:1}"/>`;
      if(isDeload) svg+=`<line x1="${x.toFixed(1)}" y1="${padT}" x2="${x.toFixed(1)}" y2="${padT+cH}" stroke="rgba(200,160,96,.06)" stroke-width="1" stroke-dasharray="2,2"/>`;
    });
    // label at last point
    const lx=padL+(s.values.length-1)/(weeks-1)*cW+4;
    const lv=s.values[s.values.length-1];
    const ly=padT+cH*(1-(lv-minV)/(maxV-minV));
    if(s.label) svg+=`<text x="${Math.min(lx,w-2)}" y="${ly+3}" font-size="6" fill="${s.color}" opacity=".7">${s.label}</text>`;
  });
  // week labels (sparse)
  for(let i=0;i<weeks;i++){
    if(i===0||i===weeks-1||(i+1)%4===0){
      const x=padL+(i/(weeks-1))*cW;
      svg+=`<text x="${x.toFixed(1)}" y="${h-2}" font-size="5.5" fill="rgba(200,160,96,.25)" text-anchor="middle">S${i+1}</text>`;
    }
  }
  svg+='</svg>';
  return svg;
}

function projICWeeks(baseIC, modelo, semanas) {
  return Array.from({length:semanas},(_, i)=>{
    let mult;
    if(modelo==='linear')       mult = 1 + i*0.04;
    else if(modelo==='block') { const ph=Math.floor(i/(semanas/3)); mult=[1+i*.03,1.1+i*.025,1.22+i*.015][Math.min(ph,2)]; }
    else if(modelo==='dup')     mult = 1 + i*.035 + (i%2===0?0:.025);
    else                        mult = 1 + i*.03 + (i%3===0?.05:0);
    if((i+1)%4===0 && i<semanas-1) mult*=.75;
    return Math.round(baseIC*mult);
  });
}

function renderMcAnalysisRadar() {
  const canvas = document.getElementById('mc-an-radar-canvas');
  if(!canvas) return;
  const t = mesoState.activeSessao;
  const items = (mesoState.sessoes[t]||[]).filter(w=>w && w.uid && w.ex);
  if(!items.length){ const ctx=canvas.getContext('2d');ctx.clearRect(0,0,canvas.width,canvas.height);return; }

  let totalN=0,totalM=0,totalMet=0,totalIC=0,sumCT=0;
  items.forEach(item=>{
    const ex=item.ex;
    item.blocks.forEach(block=>{
      const kg=block.kg||20;
      const ic=kg*block.sets*block.reps*ex.FC*(1+ex.CT/20+ex.DN/20);
      totalN+=ic*(ex.DN/10)*(1+ex.CT/20);
      totalM+=ic*(ex.IM/10)*(1+ex.SV/20);
      totalMet+=ic*(1-ex.DN/20-ex.IM/20);
      totalIC+=ic;
    });
    sumCT+=ex.CT;
  });
  const mx=Math.max(totalN,totalM,totalMet)||1;
  const avgCT=sumCT/items.length;
  const meanHist = (() => {
    const s=STUDENTS[mesoState.studentId]; if(!s||!s.sessIndices||!s.sessIndices.length) return totalIC||1;
    return s.sessIndices.reduce((a,b)=>a+b,0)/s.sessIndices.length;
  })();

  const sessionVals=[
    Math.min(totalN/mx*8,10),
    Math.min(totalM/mx*8,10),
    Math.min(totalMet/mx*8,10),
    Math.min(avgCT,10),
    Math.min(totalIC/meanHist*5,10)
  ];
  const series=[{vals:sessionVals,color:'#c8a060',opacity:mcHoveredUid?0.25:1}];

  if(mcHoveredUid){
    const hItem=findItem(mcHoveredUid);
    if(hItem && hItem.ex){
      const hr={N:0,M:0,Met:0,ic:0};
      hItem.blocks.forEach(b=>{
        const kg=b.kg||20; const ex=hItem.ex;
        const ic=kg*b.sets*b.reps*ex.FC*(1+ex.CT/20+ex.DN/20);
        hr.N+=ic*(ex.DN/10)*(1+ex.CT/20);
        hr.M+=ic*(ex.IM/10)*(1+ex.SV/20);
        hr.Met+=ic*(1-ex.DN/20-ex.IM/20);
        hr.ic+=ic;
      });
      const hmx=Math.max(hr.N,hr.M,hr.Met)||1;
      series.push({vals:[
        Math.min(hr.N/hmx*8,10),Math.min(hr.M/hmx*8,10),Math.min(hr.Met/hmx*8,10),
        hItem.ex.CT, hItem.ex.SV
      ],color:'#e0bc80',opacity:1,label:hItem.ex.name});
    }
  }
  drawRadar(canvas, series);
}

// Hook into buildExCard hover events for meso items
const _origMouseEnter = card => {};  // already patched above via isMesoItem check
// We extend the card listener after buildExCard creates it — done via mcHoveredUid in renderMcBuild wrap
</script>
