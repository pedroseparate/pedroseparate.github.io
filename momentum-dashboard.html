<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Momentum · PT Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet">

<style>
:root{
  --cream:#f7f3eb; --cream2:#f0ead8; --cream3:#e8e0cc;
  --ink:#1a1410; --ink2:#6a5848; --ink3:#a89070; --ink4:#c8b090;
  --copper:#8a6030; --copper2:#a07840; --gold:#c8a060; --gold2:#e0bc80;
  --gs:rgba(200,160,96,0.10); --cs:rgba(138,96,48,0.10);
  --dark:#1e1812; --dark2:#261e14; --dark3:#2e2618;
  --b:rgba(26,20,16,0.10); --b2:rgba(26,20,16,0.18);
  --bg:rgba(200,160,96,0.18); --bg2:rgba(200,160,96,0.30);
  --sidebar:220px;
  /* zone colors */
  --z-leve:#608040; --z-mod:#a07040; --z-pesado:#8a6030; --z-max:#6a3020;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}
body{background:var(--cream);color:var(--ink);font-family:'IBM Plex Mono',monospace;display:flex;font-size:13px;}

/* ── SIDEBAR ── */
.sidebar{width:var(--sidebar);flex-shrink:0;background:var(--dark);display:flex;flex-direction:column;height:100vh;overflow-y:auto;border-right:1px solid rgba(200,160,96,0.07);}
.sb-logo{padding:20px 18px 14px;border-bottom:1px solid rgba(200,160,96,0.07);}
.sb-logo-mark{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:600;font-size:18px;color:var(--gold);}
.sb-logo-sub{font-size:7px;text-transform:uppercase;letter-spacing:0.2em;color:rgba(200,160,96,0.25);margin-top:2px;}
.sb-sec{padding:12px 18px 4px;font-size:7px;text-transform:uppercase;letter-spacing:0.2em;color:rgba(200,160,96,0.2);}
.sb-item{padding:9px 18px;cursor:pointer;font-size:8px;color:rgba(200,160,96,0.35);text-transform:uppercase;letter-spacing:0.12em;display:flex;align-items:center;gap:8px;transition:all 0.15s;}
.sb-item:hover{color:rgba(200,160,96,0.65);background:rgba(200,160,96,0.03);}
.sb-item.active{color:var(--gold);background:rgba(200,160,96,0.05);}
.sb-student{margin:3px 10px;border:1px solid rgba(200,160,96,0.07);border-radius:2px;cursor:pointer;transition:all 0.15s;overflow:hidden;}
.sb-student:hover{border-color:rgba(200,160,96,0.18);}
.sb-student.active{border-color:rgba(200,160,96,0.3);background:rgba(200,160,96,0.04);}
.sb-sh{padding:9px 12px;display:flex;align-items:center;gap:9px;}
.sb-av{width:26px;height:26px;border-radius:50%;background:var(--dark3);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:7px;font-weight:500;color:var(--gold);border:1px solid rgba(200,160,96,0.15);}
.sb-sn{font-size:8px;font-weight:500;color:rgba(200,160,96,0.75);}
.sb-sg{font-size:7px;color:rgba(200,160,96,0.28);margin-top:1px;text-transform:uppercase;letter-spacing:0.08em;}
.sb-pulse{display:flex;align-items:center;gap:5px;padding:0 12px 9px;font-size:7px;}
.sb-pd{width:4px;height:4px;border-radius:50%;animation:sbp 2s ease infinite;}
@keyframes sbp{0%,100%{opacity:1}50%{opacity:.25}}
.sb-spacer{flex:1;}
.sb-foot{padding:14px 18px;border-top:1px solid rgba(200,160,96,0.05);font-size:7px;color:rgba(200,160,96,0.2);line-height:1.7;}

/* ── MAIN ── */
.main{flex:1;height:100vh;overflow:hidden;display:flex;flex-direction:column;}
.topbar{height:48px;flex-shrink:0;padding:0 24px;display:flex;align-items:center;justify-content:space-between;background:var(--cream);border-bottom:1px solid var(--b2);}
.topbar-title{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:600;font-size:16px;color:var(--copper);}
.topbar-actions{display:flex;gap:6px;}
.btn-sm{font-size:7px;text-transform:uppercase;letter-spacing:0.12em;padding:5px 12px;border:1px solid var(--b2);background:transparent;color:var(--ink2);cursor:pointer;transition:all 0.15s;font-family:'IBM Plex Mono',monospace;}
.btn-sm:hover{border-color:var(--copper);color:var(--copper);}
.btn-sm.pri{background:var(--ink);color:var(--cream);border-color:var(--ink);}
.btn-sm.pri:hover{background:var(--copper);border-color:var(--copper);}
.content{flex:1;overflow:hidden;display:flex;}

/* ── STUDENT VIEW ── */
.sv{flex:1;overflow-y:auto;padding:24px;}
.sv-cards{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px;}
.sv-card{background:var(--cream);border:1px solid var(--b2);padding:14px 18px;}
.sv-card-lbl{font-size:7px;text-transform:uppercase;letter-spacing:0.18em;color:var(--ink3);margin-bottom:5px;}
.sv-card-val{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:600;font-size:26px;line-height:1;color:var(--copper);}
.sv-card-sub{font-size:7px;color:var(--ink3);margin-top:3px;}
/* score-09 */
.s09{display:flex;align-items:baseline;gap:1px;}
.s09-i{font-family:'IBM Plex Mono',monospace;font-style:italic;font-weight:300;font-size:38px;line-height:1;color:var(--gold);}
.s09-d{font-family:'IBM Plex Mono',monospace;font-weight:300;font-size:20px;line-height:1;color:rgba(200,160,96,.3);}
.s09-f{font-family:'IBM Plex Mono',monospace;font-style:italic;font-weight:300;font-size:24px;line-height:1;color:rgba(200,160,96,.6);}
.sv-weeks{display:flex;flex-direction:column;gap:12px;}
.sv-week{border:1px solid var(--b);}
.sv-wh{padding:9px 14px;background:var(--cream2);display:flex;align-items:center;justify-content:space-between;cursor:pointer;border-bottom:1px solid var(--b);font-size:8px;font-weight:500;text-transform:uppercase;letter-spacing:0.1em;}
.sv-wh:hover{background:var(--cream3);}
.sv-wb{display:none;}
.sv-wb.open{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:1px;background:var(--b);}
.sv-sess{background:var(--cream);padding:14px;cursor:pointer;}
.sv-sess:hover{background:var(--cream2);}
.sv-st{display:flex;justify-content:space-between;margin-bottom:8px;}
.sv-tipo{font-size:7px;text-transform:uppercase;letter-spacing:0.12em;color:var(--copper);}
.sv-data{font-size:7px;color:var(--ink3);}
.sv-idx{display:flex;align-items:baseline;gap:1px;margin-bottom:7px;}
.sv-idx-i{font-family:'IBM Plex Mono',monospace;font-style:italic;font-weight:300;font-size:24px;line-height:1;color:var(--gold);}
.sv-idx-d{font-family:'IBM Plex Mono',monospace;font-style:italic;font-weight:300;font-size:15px;line-height:1;color:rgba(200,160,96,.4);}
.sv-bars{display:flex;flex-direction:column;gap:3px;}
.sv-br{display:flex;align-items:center;gap:5px;}
.sv-bl{font-size:7px;color:var(--ink3);width:50px;flex-shrink:0;}
.sv-bt{flex:1;height:2px;background:var(--b2);overflow:hidden;}
.sv-bf{height:100%;}
.sv-exs{margin-top:8px;border-top:1px solid var(--b);padding-top:7px;}
.sv-ex{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid var(--b);font-size:7px;}
.sv-ex:last-child{border:none;}
.sv-exn{color:var(--ink);}
.sv-exd{color:var(--ink3);}
.sv-pse{margin-top:7px;display:flex;justify-content:space-between;font-size:7px;color:var(--ink3);}
/* ritmo */
.pul-sec{margin-top:20px;}
.pul-title{font-size:7px;text-transform:uppercase;letter-spacing:0.18em;color:var(--ink3);margin-bottom:10px;}
.pul-rows{border:1px solid var(--b);padding:14px;}
.pul-row{display:flex;align-items:center;gap:9px;padding:5px 0;border-bottom:1px solid var(--b);}
.pul-row:last-child{border:none;}
.pul-lbl{font-size:7px;color:var(--ink3);width:34px;flex-shrink:0;}
.pul-bars{flex:1;display:flex;flex-direction:column;gap:3px;}
.pul-br{display:flex;align-items:center;gap:5px;}
.pul-dot{width:4px;height:4px;border-radius:50%;flex-shrink:0;}
.pul-tr{flex:1;height:3px;background:var(--b);overflow:hidden;}
.pul-fi{height:100%;}
.pul-v{font-family:'IBM Plex Mono',monospace;font-size:8px;width:22px;text-align:right;}

/* ═══════════════════════════════════════════
   GENERATOR
═══════════════════════════════════════════ */
.wg{flex:1;overflow:hidden;display:flex;flex-direction:column;}

/* Session type (valência de sessão) */
.wg-sesstype{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--b2);border-bottom:1px solid var(--b2);flex-shrink:0;}
.wg-st{padding:12px 16px;background:var(--cream);cursor:pointer;transition:background 0.15s;position:relative;}
.wg-st:hover{background:var(--cream2);}
.wg-st.active{background:var(--cream2);}
.wg-st-bar{height:2px;position:absolute;top:0;left:0;right:0;display:none;}
.wg-st.active .wg-st-bar{display:block;}
.wg-st-name{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:600;font-size:14px;margin-bottom:2px;}
.wg-st-meta{font-size:7px;color:var(--ink3);margin-bottom:5px;text-transform:uppercase;letter-spacing:0.08em;}
.wg-st-params{display:flex;gap:4px;flex-wrap:wrap;}
.wg-st-p{font-size:6px;color:var(--copper);border:1px solid rgba(138,96,48,0.2);padding:1px 5px;background:var(--cs);}

/* Three column layout */
.wg-body{flex:1;overflow:hidden;display:grid;grid-template-columns:236px 1fr 268px;}

/* Exercise bank */
.ex-bank{border-right:1px solid var(--b2);overflow:hidden;display:flex;flex-direction:column;background:var(--cream);}
.ex-bank-top{padding:9px 12px;border-bottom:1px solid var(--b);flex-shrink:0;display:flex;flex-direction:column;gap:6px;}
.ex-srch{width:100%;padding:5px 9px;font-family:'IBM Plex Mono',monospace;font-size:8px;border:1px solid var(--b2);background:transparent;color:var(--ink);outline:none;}
.ex-srch:focus{border-color:var(--copper);}
.ex-grps{display:flex;gap:3px;flex-wrap:wrap;}
.ex-grp{font-size:6px;padding:2px 6px;border:1px solid var(--b);background:transparent;color:var(--ink3);cursor:pointer;font-family:'IBM Plex Mono',monospace;text-transform:uppercase;letter-spacing:0.07em;transition:all 0.12s;}
.ex-grp.on{background:var(--cs);color:var(--copper);border-color:rgba(138,96,48,0.3);}
.ex-list{flex:1;overflow-y:auto;}
.ex-item{padding:8px 12px;border-bottom:1px solid var(--b);cursor:pointer;transition:background 0.12s;display:flex;align-items:center;gap:7px;}
.ex-item:hover{background:var(--cream2);}
.ex-item-ico{font-size:14px;flex-shrink:0;}
.ex-item-info{flex:1;min-width:0;}
.ex-item-name{font-size:8px;color:var(--ink);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ex-item-grp{font-size:6px;color:var(--ink3);text-transform:uppercase;letter-spacing:0.08em;}
.ex-item-add{font-size:16px;color:var(--copper);opacity:0;transition:opacity 0.12s;flex-shrink:0;line-height:1;}
.ex-item:hover .ex-item-add{opacity:1;}
.ex-item.already{opacity:0.35;pointer-events:none;}

/* Build area */
.wg-build{border-right:1px solid var(--b2);overflow-y:auto;padding:14px;background:var(--cream);}
.wg-build-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.wg-build-lbl{font-size:7px;text-transform:uppercase;letter-spacing:0.18em;color:var(--ink3);}
.wg-empty{text-align:center;padding:40px 16px;font-size:8px;color:var(--ink3);line-height:2;border:1px dashed var(--b2);}

/* Exercise card */
.ex-card{border:1px solid var(--b2);margin-bottom:8px;overflow:visible;background:var(--cream);transition:border-color 0.15s;position:relative;}
.ex-card:hover{border-color:rgba(138,96,48,0.3);}
.ex-card.drag-over{border-color:var(--copper);border-style:dashed;}
.ex-card.dragging{opacity:0.4;}
.ex-card-head{padding:8px 10px 8px 6px;background:var(--cream2);border-bottom:1px solid var(--b);display:flex;align-items:center;gap:6px;}
.drag-handle{cursor:grab;color:var(--ink3);font-size:12px;padding:0 4px;user-select:none;flex-shrink:0;line-height:1;}
.drag-handle:active{cursor:grabbing;}
.ex-card-ico{font-size:14px;flex-shrink:0;}
.ex-card-name{font-size:10px;font-weight:500;flex:1;color:var(--ink);}
.ex-card-grp{font-size:6px;color:var(--ink3);text-transform:uppercase;letter-spacing:0.08em;}
.ex-card-rm{font-size:16px;cursor:pointer;color:var(--ink3);background:none;border:none;line-height:1;flex-shrink:0;transition:color 0.15s;}
.ex-card-rm:hover{color:#a04030;}

/* Series type pills */
.stypes{padding:8px 10px 6px;}
.stypes-label{font-size:6px;text-transform:uppercase;letter-spacing:0.16em;color:var(--ink3);margin-bottom:5px;}
.stype-pills{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:6px;}
.stype-pill{
  font-size:7px;padding:3px 8px;border:1px solid var(--b2);background:transparent;
  color:var(--ink2);cursor:pointer;transition:all 0.12s;font-family:'IBM Plex Mono',monospace;
  text-transform:uppercase;letter-spacing:0.08em;
}
.stype-pill:hover{border-color:var(--copper);color:var(--copper);}
.stype-pill.on{color:var(--cream);border-color:transparent;}
.stype-pill.pill-locked{pointer-events:none;user-select:none;}
.stype-pill.pill-locked:hover{border-color:rgba(192,64,64,.3);color:rgba(200,120,120,.6);}
/* Spec row */
.stype-spec{
  font-size:7px;padding:5px 8px;background:var(--cream3);border:1px solid var(--b);
  display:flex;gap:10px;align-items:center;flex-wrap:wrap;
}
.stype-spec-item{display:flex;flex-direction:column;gap:1px;}
.stype-spec-lbl{font-size:6px;text-transform:uppercase;letter-spacing:0.12em;color:var(--ink3);}
.stype-spec-val{font-size:8px;font-weight:500;}
.stype-spec-dom{font-size:7px;padding:2px 7px;border:1px solid;text-transform:uppercase;letter-spacing:0.1em;}

/* Series block */
.series-block{padding:8px 10px;border-top:1px solid var(--b);}
.series-block-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;}
.series-block-label{font-size:7px;text-transform:uppercase;letter-spacing:0.14em;color:var(--ink3);}
.series-block-rm{font-size:11px;cursor:pointer;color:var(--ink3);background:none;border:none;line-height:1;font-family:'IBM Plex Mono',monospace;transition:color 0.12s;}
.series-block-rm:hover{color:#a04030;}
/* Zone selector */
.zone-row{display:flex;align-items:center;gap:6px;margin-bottom:7px;}
.zone-label{font-size:6px;text-transform:uppercase;letter-spacing:0.12em;color:var(--ink3);width:32px;flex-shrink:0;}
.zone-segs{display:flex;gap:2px;flex:1;}
.zone-seg{
  flex:1;text-align:center;padding:4px 2px;font-size:6px;text-transform:uppercase;
  letter-spacing:0.1em;border:1px solid var(--b2);cursor:pointer;
  font-family:'IBM Plex Mono',monospace;transition:all 0.12s;color:var(--ink3);
}
.zone-seg:hover{border-color:var(--copper);color:var(--copper);}
.zone-seg.on{color:#fff;border-color:transparent;}
/* Controls grid */
.ctrl-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;}
.ctrl{display:flex;flex-direction:column;gap:2px;}
.ctrl-lbl{font-size:6px;text-transform:uppercase;letter-spacing:0.1em;color:var(--ink3);}
.ctrl-input{width:100%;padding:4px 6px;font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:300;border:1px solid var(--b2);background:transparent;color:var(--ink);outline:none;text-align:center;}
.ctrl-input:focus{border-color:var(--copper);}
/* Add block button */
.add-block-btn{
  width:100%;margin-top:6px;padding:5px;font-size:7px;text-transform:uppercase;
  letter-spacing:0.12em;border:1px dashed var(--b2);background:transparent;
  color:var(--ink3);cursor:pointer;transition:all 0.15s;font-family:'IBM Plex Mono',monospace;
  display:flex;align-items:center;justify-content:center;gap:6px;
}
.add-block-btn:hover{border-color:var(--copper);color:var(--copper);}

/* ── ANALYSIS PANEL ── */
.wg-an{overflow-y:auto;background:var(--dark);display:flex;flex-direction:column;}
.an-body{padding:18px;flex:1;overflow-y:auto;}
.an-sec{margin-bottom:18px;}
.an-lbl{font-size:7px;text-transform:uppercase;letter-spacing:0.2em;color:rgba(200,160,96,0.3);margin-bottom:10px;}
canvas.an-radar{display:block;margin:0 auto;}
/* Index context */
.idx-display{text-align:center;margin:12px 0 6px;}
.idx-context-bar{margin:10px 0;}
.idx-bar-wrap{height:8px;background:rgba(200,160,96,0.06);position:relative;border-radius:2px;overflow:hidden;display:flex;}
.idx-bar-seg{height:100%;}
.idx-marker{position:absolute;top:-3px;bottom:-3px;width:2px;background:var(--cream);border-radius:1px;transition:left 0.4s ease;box-shadow:0 0 6px rgba(248,244,236,0.4);}
.idx-zones-lbl{display:flex;justify-content:space-between;font-size:6px;color:rgba(200,160,96,0.3);margin-top:4px;text-transform:uppercase;letter-spacing:0.1em;}
.idx-verdict{margin-top:8px;padding:8px 10px;border-left:2px solid var(--copper);background:rgba(200,160,96,0.04);font-size:7px;color:rgba(200,160,96,0.55);line-height:1.8;}
.idx-verdict strong{color:var(--gold);}
/* Components */
.an-comp-row{display:flex;align-items:center;gap:7px;margin-bottom:7px;}
.an-comp-lbl{font-size:7px;color:rgba(200,160,96,0.4);width:56px;flex-shrink:0;text-transform:uppercase;letter-spacing:0.08em;}
.an-comp-tr{flex:1;height:3px;background:rgba(200,160,96,0.06);overflow:hidden;}
.an-comp-fi{height:100%;transition:width 0.35s ease;}
.an-comp-v{font-family:'IBM Plex Mono',monospace;font-style:italic;font-weight:300;font-size:12px;width:36px;text-align:right;color:rgba(200,160,96,0.6);}
/* Muscles */
.an-muscle-row{display:flex;align-items:center;gap:6px;margin-bottom:5px;}
.an-m-lbl{font-size:7px;color:rgba(200,160,96,0.3);width:76px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.an-m-tr{flex:1;height:4px;background:rgba(200,160,96,0.05);overflow:hidden;}
.an-m-fi{height:100%;background:var(--copper);transition:width 0.35s ease;}
.an-m-ct{font-size:7px;color:rgba(200,160,96,0.35);width:14px;text-align:right;}
/* Valences */
.an-vals{display:flex;flex-wrap:wrap;gap:4px;}
.an-val-tag{font-size:6px;padding:2px 7px;border:1px solid;text-transform:uppercase;letter-spacing:0.1em;transition:all 0.3s;}
/* Export */
.an-export{padding:14px 18px;border-top:1px solid rgba(200,160,96,0.08);background:var(--dark2);flex-shrink:0;}
.export-lbl{font-size:7px;color:rgba(200,160,96,0.3);margin-bottom:6px;}
.btn-export{width:100%;padding:10px;font-family:'IBM Plex Mono',monospace;font-size:7px;text-transform:uppercase;letter-spacing:0.14em;background:var(--copper);color:var(--cream);border:none;cursor:pointer;transition:background 0.2s;}
.btn-export:hover{background:var(--copper2);}
.btn-export:disabled{background:rgba(200,160,96,0.08);color:rgba(200,160,96,0.2);cursor:default;}

::-webkit-scrollbar{width:3px;height:3px;}
::-webkit-scrollbar-thumb{background:rgba(138,96,48,0.18);}
.hidden{display:none!important;}

/* ══ MESOCICLO CREATOR ══ */
.mc-view{flex:1;overflow:hidden;display:flex;flex-direction:column;}
.mc-steps{display:flex;flex-shrink:0;border-bottom:1px solid var(--b2);background:var(--cream);}
.mc-step{flex:1;padding:12px 16px;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;position:relative;}
.mc-step.active{border-bottom-color:var(--copper);}
.mc-step.done{border-bottom-color:rgba(96,128,64,.5);}
.mc-step-n{font-size:7px;text-transform:uppercase;letter-spacing:.18em;color:var(--ink3);margin-bottom:2px;}
.mc-step-lbl{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:600;font-size:14px;color:var(--ink);}
.mc-step.active .mc-step-lbl{color:var(--copper);}
.mc-step.done .mc-step-lbl{color:#608040;}
.mc-body{flex:1;overflow:hidden;display:flex;}

/* step panels */
.mc-panel{flex:1;overflow-y:auto;padding:24px;display:none;}
.mc-panel.active{display:flex;flex-direction:column;gap:20px;}

/* step 1 – contexto */
.mc-aluno-card{padding:14px 18px;border:1px solid var(--b2);background:var(--cream2);display:flex;gap:16px;align-items:flex-start;}
.mc-aluno-av{width:44px;height:44px;border-radius:50%;background:var(--dark);display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--gold);border:1px solid rgba(200,160,96,.2);flex-shrink:0;}
.mc-aluno-info{flex:1;}
.mc-aluno-name{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:600;font-size:18px;color:var(--copper);margin-bottom:2px;}
.mc-aluno-sub{font-size:7px;text-transform:uppercase;letter-spacing:.14em;color:var(--ink3);}
.mc-aluno-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px;}
.mc-aluno-tag{font-size:7px;padding:2px 8px;border:1px solid var(--b2);color:var(--ink3);}
.mc-aluno-tag.warn{border-color:rgba(180,100,20,.3);color:#b06020;background:rgba(180,100,20,.05);}
.mc-aluno-tag.blank{border-color:rgba(200,160,96,.2);color:var(--copper);background:rgba(138,96,48,.05);}

.mc-field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.mc-field-row.three{grid-template-columns:1fr 1fr 1fr;}
.mc-field{display:flex;flex-direction:column;gap:4px;}
.mc-label{font-size:7px;text-transform:uppercase;letter-spacing:.16em;color:var(--ink3);}
.mc-select,.mc-input{width:100%;padding:7px 10px;font-family:'IBM Plex Mono',monospace;font-size:10px;border:1px solid var(--b2);background:var(--cream);color:var(--ink);outline:none;cursor:pointer;}
.mc-select:focus,.mc-input:focus{border-color:var(--copper);}
.mc-select option{background:var(--cream);}
.mc-textarea{width:100%;padding:7px 10px;font-family:'IBM Plex Mono',monospace;font-size:9px;border:1px solid var(--b2);background:var(--cream);color:var(--ink);outline:none;resize:vertical;min-height:60px;}
.mc-section-title{font-size:7px;text-transform:uppercase;letter-spacing:.22em;color:var(--ink3);padding-bottom:8px;border-bottom:1px solid var(--b);}

/* step 2 – divisões */
.mc-div-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.mc-div-card{padding:14px;border:1px solid var(--b2);cursor:pointer;transition:all .15s;position:relative;}
.mc-div-card:hover{border-color:var(--copper2);background:var(--cream2);}
.mc-div-card.selected{border-color:var(--copper);background:rgba(138,96,48,.04);}
.mc-div-card.recommended{border-color:rgba(96,128,64,.4);background:rgba(96,128,64,.02);}
.mc-div-card.recommended.selected{border-color:var(--copper);}
.mc-div-badge{position:absolute;top:8px;right:8px;font-size:6px;padding:2px 6px;text-transform:uppercase;letter-spacing:.1em;}
.mc-div-badge.rec{background:rgba(96,128,64,.12);color:#608040;border:1px solid rgba(96,128,64,.25);}
.mc-div-badge.incompatible{background:rgba(160,60,20,.08);color:#a04020;border:1px solid rgba(160,60,20,.2);}
.mc-div-name{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:600;font-size:15px;color:var(--copper);margin-bottom:3px;}
.mc-div-sub{font-size:7px;color:var(--ink3);margin-bottom:6px;line-height:1.6;}
.mc-div-days{display:flex;gap:3px;flex-wrap:wrap;}
.mc-div-day{font-size:6px;padding:2px 6px;border:1px solid var(--b);text-transform:uppercase;letter-spacing:.08em;color:var(--ink3);}
.mc-div-day.treino{background:rgba(138,96,48,.08);border-color:rgba(138,96,48,.2);color:var(--copper);}
.mc-div-day.descanso{color:rgba(26,20,16,.3);}
.mc-div-reason{font-size:7px;color:#608040;margin-top:6px;padding:4px 8px;background:rgba(96,128,64,.06);border-left:2px solid rgba(96,128,64,.3);line-height:1.6;}
.mc-div-reason.warn{color:#a06020;background:rgba(160,96,20,.06);border-left-color:rgba(160,96,20,.3);}

/* week grid */
.mc-week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-top:8px;}
.mc-week-cell{padding:6px 4px;border:1px solid var(--b);text-align:center;font-size:7px;}
.mc-week-cell.treino{background:rgba(138,96,48,.07);border-color:rgba(138,96,48,.2);color:var(--copper);}
.mc-week-cell.descanso{color:var(--ink3);}
.mc-week-day{font-size:6px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink3);margin-bottom:2px;}
.mc-week-tipo{font-size:7px;font-weight:500;}

/* step 3 – exercícios por sessão */
.mc-sess-tabs{display:flex;gap:2px;margin-bottom:12px;flex-wrap:wrap;}
.mc-sess-tab{padding:6px 14px;border:1px solid var(--b2);font-size:8px;cursor:pointer;text-transform:uppercase;letter-spacing:.1em;color:var(--ink3);transition:all .12s;}
.mc-sess-tab:hover{border-color:var(--copper);color:var(--copper);}
.mc-sess-tab.active{background:var(--ink);color:var(--cream);border-color:var(--ink);}
.mc-sess-layout{display:grid;grid-template-columns:220px 1fr 260px;gap:0;border:1px solid var(--b2);height:460px;}
.mc-ex-bank{border-right:1px solid var(--b2);overflow:hidden;display:flex;flex-direction:column;}
.mc-ex-list{flex:1;overflow-y:auto;}
.mc-ex-item{padding:7px 10px;border-bottom:1px solid var(--b);cursor:pointer;display:flex;gap:6px;align-items:center;transition:background .1s;}
.mc-ex-item:hover{background:var(--cream2);}
.mc-ex-item.added{opacity:.35;pointer-events:none;}
.mc-ex-item-name{font-size:8px;color:var(--ink);flex:1;}
.mc-ex-item-grp{font-size:6px;color:var(--ink3);text-transform:uppercase;letter-spacing:.06em;}
.mc-ex-coefs{display:flex;gap:2px;margin-top:2px;}
.mc-ex-coef{font-size:6px;padding:1px 4px;border:1px solid var(--b);color:var(--ink3);}
.mc-ex-coef.hi{border-color:rgba(138,96,48,.25);color:var(--copper);}
.mc-build-area{overflow-y:auto;padding:10px;}
.mc-build-empty{text-align:center;padding:32px 12px;font-size:8px;color:var(--ink3);line-height:2;border:1px dashed var(--b2);}
.mc-ex-row{border:1px solid var(--b2);margin-bottom:6px;background:var(--cream);}
.mc-ex-row-head{padding:7px 10px;background:var(--cream2);border-bottom:1px solid var(--b);display:flex;align-items:center;gap:6px;}
.mc-ex-row-name{font-size:9px;font-weight:500;flex:1;color:var(--ink);}
.mc-ex-row-rm{font-size:14px;cursor:pointer;color:var(--ink3);background:none;border:none;line-height:1;transition:color .1s;}
.mc-ex-row-rm:hover{color:#a04030;}
.mc-ex-prog{padding:8px 10px;display:flex;flex-direction:column;gap:6px;}
.mc-prog-row{display:grid;grid-template-columns:60px 1fr 1fr 1fr 1fr 28px;gap:4px;align-items:center;}
.mc-prog-lbl{font-size:7px;color:var(--ink3);text-transform:uppercase;letter-spacing:.08em;}
.mc-prog-input{padding:3px 5px;font-family:'IBM Plex Mono',monospace;font-size:9px;border:1px solid var(--b2);background:transparent;color:var(--ink);text-align:center;width:100%;outline:none;}
.mc-prog-input:focus{border-color:var(--copper);}
.mc-prog-zone{display:flex;gap:2px;}
.mc-prog-z{flex:1;padding:3px 2px;text-align:center;font-size:6px;border:1px solid var(--b2);cursor:pointer;text-transform:uppercase;transition:all .1s;}
.mc-prog-z:hover{border-color:var(--copper);}
.mc-prog-z.on{color:#fff;border-color:transparent;}
.mc-prog-override{display:flex;align-items:center;gap:4px;font-size:7px;color:var(--copper2);}
.mc-prog-override input[type=checkbox]{cursor:pointer;}
.mc-override-row{padding:4px 10px 8px;background:rgba(138,96,48,.03);border-top:1px dashed var(--b);}
.mc-override-inner{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:4px;}
.mc-override-lbl{font-size:7px;color:var(--ink3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:3px;}
.mc-override-select{width:100%;padding:4px 6px;font-family:'IBM Plex Mono',monospace;font-size:8px;border:1px solid rgba(138,96,48,.25);background:transparent;color:var(--copper);outline:none;}

/* step 3 analysis panel */
.mc-an{background:var(--dark);overflow-y:auto;padding:14px;}
.mc-an-lbl{font-size:7px;text-transform:uppercase;letter-spacing:.2em;color:rgba(200,160,96,.3);margin-bottom:8px;}
.mc-proj-chart{height:80px;position:relative;margin-bottom:12px;}
.mc-proj-bars{display:flex;gap:2px;align-items:flex-end;height:60px;}
.mc-proj-bar{flex:1;border-radius:1px 1px 0 0;position:relative;transition:height .3s;}
.mc-proj-bar-lbl{position:absolute;bottom:-14px;left:50%;transform:translateX(-50%);font-size:6px;color:rgba(200,160,96,.3);white-space:nowrap;}
.mc-proj-bar-val{position:absolute;top:-14px;left:50%;transform:translateX(-50%);font-size:7px;color:rgba(200,160,96,.6);white-space:nowrap;}

/* step 4 – revisão */
.mc-review{display:flex;flex-direction:column;gap:16px;}
.mc-review-header{padding:16px 18px;background:var(--dark);color:var(--gold);}
.mc-review-meso-name{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:600;font-size:22px;margin-bottom:4px;}
.mc-review-sub{font-size:8px;color:rgba(200,160,96,.4);text-transform:uppercase;letter-spacing:.14em;}
.mc-review-week{border:1px solid var(--b2);overflow:hidden;}
.mc-review-week-head{padding:8px 14px;background:var(--cream2);font-size:8px;font-weight:500;text-transform:uppercase;letter-spacing:.1em;border-bottom:1px solid var(--b);}
.mc-review-sess-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:1px;background:var(--b);}
.mc-review-sess{background:var(--cream);padding:10px 12px;}
.mc-review-sess-tipo{font-size:7px;text-transform:uppercase;letter-spacing:.1em;color:var(--copper);margin-bottom:4px;}
.mc-review-ex-list{font-size:7px;color:var(--ink3);line-height:1.9;}

/* navigation buttons */
.mc-nav{display:flex;justify-content:space-between;align-items:center;padding:14px 24px;border-top:1px solid var(--b2);background:var(--cream);flex-shrink:0;}
.mc-nav-info{font-size:8px;color:var(--ink3);}

/* ─── Session Detail Modal ─────────────────────────── */
.sd-overlay{position:fixed;inset:0;background:rgba(10,8,6,.72);z-index:800;display:flex;align-items:stretch;justify-content:flex-end;}
.sd-panel{width:680px;max-width:100vw;background:var(--cream);display:flex;flex-direction:column;overflow:hidden;box-shadow:-8px 0 32px rgba(0,0,0,.4);}
.sd-header{padding:16px 20px;background:var(--dark);border-bottom:1px solid rgba(200,160,96,.12);display:flex;align-items:center;gap:12px;flex-shrink:0;}
.sd-header-tipo{font-size:7px;text-transform:uppercase;letter-spacing:.22em;color:rgba(200,160,96,.4);}
.sd-header-name{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:600;font-size:22px;color:rgba(240,224,192,.9);}
.sd-header-meta{font-size:8px;color:rgba(200,160,96,.35);margin-top:2px;}
.sd-close{margin-left:auto;background:none;border:1px solid rgba(200,160,96,.15);color:rgba(200,160,96,.4);cursor:pointer;width:28px;height:28px;font-size:14px;transition:all .12s;}
.sd-close:hover{border-color:rgba(200,160,96,.4);color:rgba(200,160,96,.8);}
.sd-body{flex:1;overflow-y:auto;display:grid;grid-template-columns:1fr 240px;gap:0;}
.sd-main{padding:16px 18px;border-right:1px solid var(--b2);overflow-y:auto;}
.sd-aside{background:var(--dark);padding:14px;overflow-y:auto;}
.sd-sec{margin-bottom:18px;}
.sd-sec-lbl{font-size:7px;text-transform:uppercase;letter-spacing:.2em;color:var(--ink3);margin-bottom:10px;padding-bottom:5px;border-bottom:1px solid var(--b);}
.sd-ex-card{border:1px solid var(--b2);margin-bottom:8px;overflow:hidden;}
.sd-ex-head{padding:8px 12px;background:var(--cream2);display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--b);}
.sd-ex-ico{font-size:16px;flex-shrink:0;}
.sd-ex-name{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:600;font-size:15px;color:var(--ink);flex:1;}
.sd-ex-grp{font-size:6px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink3);}
.sd-ex-body{padding:8px 12px;display:flex;flex-direction:column;gap:6px;}
.sd-ex-stats{display:flex;gap:4px;flex-wrap:wrap;}
.sd-ex-stat{font-size:7px;padding:2px 7px;border:1px solid var(--b2);color:var(--ink3);}
.sd-ex-stat.hi{border-color:rgba(138,96,48,.3);color:var(--copper);}
.sd-ex-perf{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--b);}
.sd-ex-perf-cell{background:var(--cream);padding:8px;text-align:center;}
.sd-ex-perf-lbl{font-size:6px;text-transform:uppercase;letter-spacing:.1em;color:var(--ink3);margin-bottom:2px;}
.sd-ex-perf-val{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:600;font-size:18px;color:var(--copper);}
.sd-ex-note{font-size:7.5px;color:var(--ink3);line-height:1.8;font-style:italic;padding:6px 0 0;}
.sd-ic-display{display:flex;align-items:baseline;gap:4px;margin-bottom:8px;}
.sd-aside-lbl{font-size:7px;text-transform:uppercase;letter-spacing:.18em;color:rgba(200,160,96,.3);margin-bottom:8px;}
/* meso analysis radar */
.mc-an-radar-wrap{margin-bottom:14px;}
canvas.mc-an-radar{display:block;margin:0 auto;}
/* projection line chart SVG */
.proj-svg-wrap{margin-bottom:14px;}
.proj-svg-wrap svg{display:block;width:100%;overflow:visible;}
/* ─── Utilities & Auth ─────────────────────────────── */
.topbar-logout{background:none;border:1px solid rgba(138,96,48,.2);color:rgba(138,96,48,.45);font-family:'IBM Plex Mono',monospace;font-size:7px;letter-spacing:.14em;text-transform:uppercase;padding:5px 12px;cursor:pointer;transition:all .15s;margin-left:8px;}
.topbar-logout:hover{border-color:var(--copper);color:var(--copper);}
.app-loading{position:fixed;inset:0;background:#120f0a;display:flex;align-items:center;justify-content:center;z-index:9999;transition:opacity .5s;}
.app-loading.out{opacity:0;pointer-events:none;}
.app-loading-inner{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:28px;color:rgba(200,160,96,.45);letter-spacing:.06em;}

/* ─── Mobile: Sidebar becomes bottom nav ────────────── */
@media(max-width:860px){
  html,body{overflow:auto;}
  body{flex-direction:column;height:auto;min-height:100vh;}

  /* Sidebar → sticky top strip */
  .sidebar{
    width:100%!important;height:auto!important;
    flex-direction:row;overflow-x:auto;
    position:sticky;top:0;z-index:200;
    border-right:none!important;border-bottom:1px solid rgba(200,160,96,.12);
    padding:0;gap:0;flex-shrink:0;
    -webkit-overflow-scrolling:touch;scrollbar-width:none;
  }
  .sidebar::-webkit-scrollbar{display:none;}
  .sb-logo{padding:12px 16px;border-bottom:none;border-right:1px solid rgba(200,160,96,.08);flex-shrink:0;}
  .sb-logo-sub{display:none;}
  .sb-sec{display:none;}
  .sb-spacer,.sb-foot{display:none;}

  /* Nav items → compact chips */
  .sb-item{
    padding:12px 16px;min-width:auto;flex-shrink:0;
    font-size:8px;border-bottom:none;border-right:1px solid rgba(200,160,96,.06);
    white-space:nowrap;
  }

  /* Student tiles → horizontal scroll chips */
  .sb-student{
    margin:6px 4px;border-radius:2px;flex-shrink:0;
    min-width:110px;max-width:130px;
  }
  .sb-sh{padding:7px 10px;gap:7px;}
  .sb-av{width:22px;height:22px;font-size:6px;}
  .sb-sn{font-size:7px;}
  .sb-sg{display:none;}
  .sb-pulse{padding:0 10px 7px;gap:4px;}
  .sb-pd{width:3px;height:3px;}

  /* Main becomes scrollable */
  .main{height:auto;overflow:visible;flex:1;}
  .content{flex:1;overflow:visible;flex-direction:column;}

  /* Topbar */
  .topbar{padding:10px 16px;height:auto;flex-wrap:wrap;gap:6px;}
  .topbar-actions{flex-wrap:wrap;gap:4px;}
  .btn-sm{font-size:7px;padding:5px 10px;}
  .topbar-logout{padding:5px 10px;}

  /* Student view */
  .sv{padding:16px;}
  .sv-cards{grid-template-columns:repeat(2,1fr)!important;gap:8px;}
  .sv-wb{grid-template-columns:1fr!important;}
  .sv-weeks{gap:8px;}

  /* Charts & analysis sections */
  .ic-chart-wrap,.dim-chart-wrap,.trend-wrap{overflow-x:auto;}
  .pul-sec{margin-top:16px;}

  /* Mesociclo creator */
  .mc-steps{overflow-x:auto;-webkit-overflow-scrolling:touch;}
  .mc-step{min-width:80px;}
  .mc-sess-layout{grid-template-columns:1fr!important;height:auto!important;}
  .mc-ex-bank{max-height:180px;border-right:none!important;border-bottom:1px solid var(--b2);}
  .mc-build-area{max-height:none;}
  .mc-an{display:none;}

  /* Generator */
  .wg-scenarios{grid-template-columns:repeat(2,1fr)!important;}
  .wg-layout{grid-template-columns:1fr!important;height:auto!important;}
  .ex-bank{max-height:180px;border-right:none!important;border-bottom:1px solid var(--b2);}
  .build-area{max-height:none;}
  .analysis-panel{display:none;}

  /* Session detail modal */
  .sd-panel{width:100vw!important;}
  .sd-body{grid-template-columns:1fr!important;}
  .sd-aside{display:none;}
  .sd-ex-perf{grid-template-columns:repeat(2,1fr)!important;}

  /* Misc */
  .mc-review{font-size:10px;}
  .ex-card-head{flex-wrap:wrap;}
  .stype-pills{flex-wrap:wrap;}
  .ctrl-row{flex-wrap:wrap;}
  .ctrl{min-width:80px;}
}

@media(max-width:480px){
  .sv{padding:12px;}
  .sv-cards{grid-template-columns:1fr 1fr!important;gap:6px;}
  .s09-i{font-size:28px!important;}
  .sv-card{padding:10px 12px;}
  .topbar-title{font-size:14px;}
  .wg-scenarios{grid-template-columns:1fr 1fr!important;gap:6px!important;}
  .mc-steps{gap:4px;}
  .mc-step-lbl{font-size:7px;}
}

/* Long-term progress charts (new) */
.lt-section{margin-top:24px;border-top:1px solid var(--b);}
.lt-title{font-size:7px;text-transform:uppercase;letter-spacing:.2em;color:var(--ink3);padding:14px 0 10px;}
.lt-chart-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:4px;}
.lt-svg-wrap{min-width:320px;}
.lt-highlights{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:14px;}
.lt-highlight{padding:12px 14px;border:1px solid var(--b);position:relative;overflow:hidden;}
.lt-highlight::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.lt-highlight.pos::before{background:linear-gradient(90deg,#608040,#7aaa50);}
.lt-highlight.neg::before{background:linear-gradient(90deg,#8a3020,#c86030);}
.lt-highlight.neu::before{background:linear-gradient(90deg,var(--copper),var(--gold));}
.lt-hl-lbl{font-size:7px;text-transform:uppercase;letter-spacing:.14em;color:var(--ink3);margin-bottom:5px;}
.lt-hl-val{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:22px;color:var(--copper);line-height:1;}
.lt-hl-sub{font-size:7px;color:var(--ink3);margin-top:3px;}
@media(max-width:860px){
  .lt-highlights{grid-template-columns:repeat(2,1fr);}
}
@media(max-width:480px){
  .lt-highlights{grid-template-columns:1fr 1fr;}
  .lt-highlight{padding:10px 12px;}
}

/* Session detail per-series table */
.sd-series-table{width:100%;border-collapse:collapse;margin-top:8px;}
.sd-series-table th{font-size:6px;text-transform:uppercase;letter-spacing:.1em;color:var(--ink3);padding:4px 8px;text-align:left;border-bottom:1px solid var(--b);}
.sd-series-table td{font-size:8px;padding:5px 8px;border-bottom:1px solid var(--b);color:var(--ink);font-family:'IBM Plex Mono',monospace;}
.sd-series-table tr:last-child td{border-bottom:none;}
.sd-series-table tr:hover td{background:var(--cream2);}
.sd-series-num{color:var(--ink3)!important;font-size:7px!important;}
.sd-pse-bar{display:inline-block;height:3px;background:var(--copper);opacity:.5;margin-left:4px;vertical-align:middle;border-radius:1px;}

/* Dimensional tooltip */
.dim-tooltip{
  position:fixed;z-index:999;
  background:var(--dark);color:rgba(200,160,96,.85);
  border:1px solid rgba(200,160,96,.18);
  padding:10px 14px;max-width:220px;
  font-size:8px;line-height:1.6;pointer-events:none;
  opacity:0;transition:opacity .15s;letter-spacing:.04em;
}
.dim-tooltip.show{opacity:1;}
.dim-tooltip strong{display:block;font-size:9px;color:var(--gold);margin-bottom:4px;letter-spacing:.08em;}

/* Exercise hover highlight in radar */
.sd-ex-card{cursor:default;transition:background .12s;}
.sd-ex-card:hover{background:var(--cream2);}
.sd-ex-card.hovered{background:var(--cream2);border-left:2px solid var(--copper)!important;}

.lt-hl-row{display:flex;gap:8px;margin:10px 0 4px;flex-wrap:wrap;}

function repsToZone(r) {
  if(r >= 15) return 'leve';
  if(r >= 10) return 'moderado';
  if(r >= 5)  return 'pesado';
  return 'maximo';
}
function zoneToReps(z) {
  return ZONES.find(zz=>zz.id===z)?.reps_def || 10;
}

const STUDENTS = {};

// ── Gera iniciais a partir do nome ──────────────────────
function makeInitials(name) {
  return name.split(/[,\s]+/).filter(Boolean).slice(0,2).map(w=>w[0].toUpperCase()).join('');
}

// ── Renderiza lista de alunos na sidebar ─────────────────
function renderSidebar() {
  const list = document.getElementById('sb-students-list');
  if(!list) return;
  list.innerHTML = '';
  Object.keys(STUDENTS).forEach((sid, i) => {
    const s = STUDENTS[sid];
    const initials = makeInitials(s.name || sid);
    const hasMeso = s.mesociclo && s.mesociclo !== '—';
    const div = document.createElement('div');
    div.className = 'sb-student' + (i === 0 ? ' active' : '');
    div.id = 'sb-' + sid;
    div.setAttribute('onclick', `selectStudent('${sid}')`);
    if(!hasMeso) div.style.cssText = 'border-style:dashed;opacity:.7';
    div.innerHTML = `
      <div class="sb-sh">
        <div class="sb-av">${initials}</div>
        <div>
          <div class="sb-sn">${s.name || sid}</div>
          <div class="sb-sg" style="${!hasMeso ? 'color:rgba(200,160,96,.5)' : ''}">${s.mesociclo || 'Sem mesociclo'}</div>
        </div>
      </div>
      <div class="sb-pulse" id="ritmo-${sid}"></div>`;
    list.appendChild(div);
  });
}

// ── Bootstrap: Firebase é a única fonte de dados ─────────
async function bootstrapFromFirebase() {
  try {
    if(typeof db === 'undefined' || db === null) throw new Error('Firebase não configurado');

    const [studentsSnap, sessionsSnap] = await Promise.all([
      db.collection('students').get(),
      db.collection('sessions').orderBy('date','asc').get()
    ]);

    if(studentsSnap.empty) throw new Error('Nenhum aluno no Firestore');

    const sessions = sessionsSnap.docs.map(d => ({id: d.id, ...d.data()}));

    // Limpa STUDENTS antes de popular
    Object.keys(STUDENTS).forEach(k => delete STUDENTS[k]);

    studentsSnap.forEach(doc => {
      const s   = {id: doc.id, ...doc.data()};
      const sid = doc.id;
      const studentSessions = sessions.filter(sess => sess.student_id === sid);

      // Agrupa por semana
      const weekMap = {};
      studentSessions.forEach(sess => {

        if(!weekMap[wk]) weekMap[wk] = {n:wk, label: sess.semana_label || `Semana ${wk}`, sessoes:[]};

          pse:       sess.pse || 7,
          n:         sess.n   || 0.33,
          m:         sess.m   || 0.33,
          met:       sess.met || 0.33,
          exercicios:(sess.exercicios || []).map(e => ({
            nome: e.nome || e.name || '',
            s:    e.s    || e.sets || 3,
            r:    e.r    || e.reps || 10,
            kg:   e.kg   || 0,
            pse:  e.pse  || 7

      const semanas        = Object.values(weekMap).sort((a,b) => a.n - b.n);
      const allSessIndices = studentSessions.map(sess => sess.indice_carga || 0);
      const momentum       = (s.scores || {}).momentum || '—';

      STUDENTS[sid] = {
        name:       s.name      || sid,
        mesociclo:  s.mesociclo || '—',
        nivel:      s.nivel     || '—',
        anamnese:   s.anamnese  || {},
        records:    s.records   || {},
        semanas,
        sessIndices:  allSessIndices,
        pulsoData:    buildPulsoData(semanas),
        scoreAtual:   typeof momentum === 'number' ? momentum.toFixed(1) : String(momentum),
      };
    });

    console.log('[Momentum] Firebase carregado:', Object.keys(STUDENTS).length, 'alunos');
    renderSidebar();
    renderRitmoBadges();
    const firstId = Object.keys(STUDENTS)[0];
    if(firstId) selectStudent(currentStudentId in STUDENTS ? currentStudentId : firstId);
    navTo('students');

  } catch(e) {
    console.error('[Momentum] Erro ao carregar Firebase:', e.message);
    const list = document.getElementById('sb-students-list');
    if(list) list.innerHTML = `<div style="padding:12px;color:rgba(200,80,60,.7);font-size:9px;line-height:1.6">
      ⚠ Firebase não conectado.<br><span style="color:rgba(200,160,96,.35)">${e.message}</span><br><br>
      <span style="color:rgba(200,160,96,.4)">Configure o firebase-config.js<br>para carregar os alunos.</span></div>`;
    renderSidebar();
    navTo('students');
  }
}

function buildPulsoData(semanas) {
  return semanas.slice(-5).map(wk => {
    const ics = wk.sessoes.map(s=>s.indice);
    const pses = wk.sessoes.map(s=>s.pse);
    const avgIC = ics.reduce((a,b)=>a+b,0)/(ics.length||1);
    const avgPSE = pses.reduce((a,b)=>a+b,0)/(pses.length||1);
    const maxIC = 30000;
    return {c: Math.min(avgIC/maxIC, 1), p: Math.min(avgPSE/10, 1)};
  });
}

// ═══════════════════════════════════════════════════════
// RM ESTIMATION (Epley)
// ═══════════════════════════════════════════════════════

// Build name→id map from EXERCISES for matching history (which stores names)
const EX_NAME_MAP = {};
EXERCISES.forEach(e => { EX_NAME_MAP[e.name.toLowerCase()] = e.id; });

// Epley: estimate 1RM from a set
function epley1RM(kg, reps) {
  if(reps === 1) return kg;
  return kg * (1 + reps / 30);
}

// xRM from 1RM
function xRM(oneRM, reps) {
  return oneRM / (1 + reps / 30);
}

// Round to nearest 0.5kg
function round05(v) { return Math.round(v * 2) / 2; }

// Estimate best 1RM for an exercise from current student's history
function estimateRM(exId, studentId) {
  const student = STUDENTS[studentId || currentStudentId];
  if(!student) return null;
  const ex = EXERCISES.find(e => e.id === exId);
  if(!ex) return null;

  let best = null; // {kg, reps, data, oneRM}

  student.semanas.forEach(sem => {
    sem.sessoes.forEach(sess => {
      sess.exercicios.forEach(e => {
        // Match by name (history) to id (bank)
        const histId = EX_NAME_MAP[e.nome.toLowerCase()];
        if(histId !== exId) return;
        if(e.kg <= 0 || e.r <= 0) return;
        const est1rm = epley1RM(e.kg, e.r);
        if(!best || est1rm > best.oneRM) {
          best = { kg: e.kg, reps: e.r, data: sess.data, oneRM: est1rm };
        }
      });
    });
  });

  return best;
}

// Given a zone id, return suggested kg based on RM estimate
// Uses Epley inverse: load for N reps = 1RM / (1 + N/30)
function suggestKgForZone(exId, zoneId) {
  const rm = estimateRM(exId);
  if(!rm) return { kg: 0, badge: null };
  const zone = ZONES.find(z => z.id === zoneId);
  const targetReps = zone ? zone.reps_def : 10;
  const suggestedKg = round05(xRM(rm.oneRM, targetReps));
  const badge = {
    oneRM: Math.round(rm.oneRM),
    bestKg: rm.kg,
    bestReps: rm.reps,
    bestData: rm.data,
  };
  return { kg: suggestedKg, badge };
}

// ═══════════════════════════════════════════════════════
// RITMO DE ADAPTAÇÃO (IC ÷ PSE — janela 4 semanas)
// ═══════════════════════════════════════════════════════
function calcRitmo(studentId) {
  const s = STUDENTS[studentId];
  if(!s || !s.semanas) return null;
  // Flatten last 4 weeks of sessions with valid IC and PSE
  const allSess = [];
  s.semanas.slice(-4).forEach((sem, wi) => {
    sem.sessoes.forEach(sess => {
      if(sess.indice > 0 && sess.pse > 0)
        allSess.push({ score: sess.indice / sess.pse, week: wi });
    });
  });
  if(allSess.length < 4) return { estado: 'estavel', delta: 0, score: 0 };
  const half = Math.floor(allSess.length / 2);
  const older = allSess.slice(0, half).map(s => s.score);
  const newer = allSess.slice(half).map(s => s.score);
  const avgOld = older.reduce((a,b)=>a+b,0)/older.length;
  const avgNew = newer.reduce((a,b)=>a+b,0)/newer.length;
  const delta = ((avgNew - avgOld) / avgOld) * 100;
  let estado;
  if(delta >= 10) estado = 'alta';
  else if(delta >= -10) estado = 'estavel';
  else if(delta >= -20) estado = 'queda';
  else estado = 'critica';
  return { estado, delta: Math.round(delta), score: Math.round(avgNew) };
}

// Média móvel do Ritmo: retorna um valor por semana (janela deslizante de 4 semanas)
// A partir da semana 1, calcula com o que existe (janela parcial até ter 4 semanas completas)
function calcRitmoRolling(studentId) {
  const s = STUDENTS[studentId];
  if(!s || !s.semanas || s.semanas.length < 2) return [];

  const WINDOW = 4;
  const result = [];

  s.semanas.forEach((_, wi) => {
    // janela: até 4 semanas terminando em wi (inclusive)
    const start = Math.max(0, wi - WINDOW + 1);
    const windowWeeks = s.semanas.slice(start, wi + 1);

    // flatten sessões da janela com IC e PSE válidos
    const sessions = windowWeeks.flatMap(w =>
      w.sessoes.filter(sess => sess.indice > 0 && sess.pse > 0)
    );

    if(sessions.length < 2) { result.push(null); return; }

    const avgIC  = sessions.reduce((a,b) => a + b.indice, 0) / sessions.length;
    const avgPSE = sessions.reduce((a,b) => a + b.pse,    0) / sessions.length;
    const ritmo  = avgIC / avgPSE;

    result.push({ week: wi, label: wi < s.semanas.length - 1 ? `Sem ${wi+1}` : 'Atual', ritmo: Math.round(ritmo), partial: (wi - start + 1) < WINDOW });
  });

  return result;
}

function renderRitmoRollingChart(studentId) {
  const cv = document.getElementById('ritmo-rolling-chart');
  if(!cv) return;
  const rolling = calcRitmoRolling(studentId);
  const valid = rolling.filter(p => p !== null);
  if(valid.length < 2) return;

  const W = cv.clientWidth || 360;
  const H = 80;
  cv.width  = W * devicePixelRatio;
  cv.height = H * devicePixelRatio;
  const ctx = cv.getContext('2d');
  ctx.scale(devicePixelRatio, devicePixelRatio);

  const vals = valid.map(p => p.ritmo);
  const max  = Math.max(...vals) * 1.12;
  const min  = Math.min(...vals) * 0.88;
  const range = max - min || 1;
  const pad  = { t: 8, b: 20, l: 6, r: 6 };
  const cW   = W - pad.l - pad.r;
  const cH   = H - pad.t - pad.b;

  function sx(i) { return pad.l + (i / (valid.length - 1)) * cW; }
  function sy(v) { return pad.t + cH - ((v - min) / range) * cH; }

  // grid lines
  ctx.strokeStyle = 'rgba(200,160,96,.07)';
  ctx.lineWidth = 1;
  [0.25, 0.5, 0.75, 1].forEach(f => {
    const y = pad.t + cH * (1 - f);
    ctx.beginPath(); ctx.moveTo(pad.l, y); ctx.lineTo(W - pad.r, y); ctx.stroke();
  });

  // gradient fill
  const grad = ctx.createLinearGradient(0, pad.t, 0, H);
  grad.addColorStop(0, 'rgba(200,160,96,.18)');
  grad.addColorStop(1, 'rgba(200,160,96,0)');

  ctx.beginPath();
  valid.forEach((p, i) => i === 0 ? ctx.moveTo(sx(i), sy(p.ritmo)) : ctx.lineTo(sx(i), sy(p.ritmo)));
  ctx.lineTo(sx(valid.length - 1), H); ctx.lineTo(sx(0), H); ctx.closePath();
  ctx.fillStyle = grad; ctx.fill();

  // line — dashed for partial windows, solid for full 4-week window
  let inPartial = null;
  valid.forEach((p, i) => {
    if(i === 0) { ctx.beginPath(); ctx.moveTo(sx(i), sy(p.ritmo)); inPartial = p.partial; return; }
    if(p.partial !== inPartial) {
      // flush current segment
      ctx.strokeStyle = 'rgba(200,160,96,' + (inPartial ? '.4' : '.85') + ')';
      ctx.lineWidth = inPartial ? 1 : 1.8;
      if(inPartial) ctx.setLineDash([3, 3]); else ctx.setLineDash([]);
      ctx.stroke();
      ctx.beginPath(); ctx.moveTo(sx(i - 1), sy(valid[i - 1].ritmo));
      inPartial = p.partial;
    }
    ctx.lineTo(sx(i), sy(p.ritmo));
  });
  ctx.strokeStyle = 'rgba(200,160,96,' + (inPartial ? '.4' : '.85') + ')';
  ctx.lineWidth = inPartial ? 1 : 1.8;
  if(inPartial) ctx.setLineDash([3, 3]); else ctx.setLineDash([]);
  ctx.stroke();
  ctx.setLineDash([]);

  // dots
  valid.forEach((p, i) => {
    ctx.beginPath(); ctx.arc(sx(i), sy(p.ritmo), p.partial ? 2 : 3, 0, Math.PI * 2);
    ctx.fillStyle = p.partial ? 'rgba(200,160,96,.4)' : 'var(--copper)';
    ctx.fill();
  });

  // x labels
  ctx.fillStyle = 'rgba(200,160,96,.35)';
  ctx.font = '6px IBM Plex Mono';
  valid.forEach((p, i) => {
    if(valid.length <= 8 || i % Math.ceil(valid.length / 8) === 0 || i === valid.length - 1)
      ctx.fillText(p.label, sx(i) - 10, H - 4);
  });

  // legend hint
  ctx.fillStyle = 'rgba(200,160,96,.3)';
  ctx.font = '7px IBM Plex Mono';
  ctx.fillText('— janela 4 sem.   - - parcial', pad.l, pad.t - 1);

  // hover
  const tip = document.getElementById('ritmo-rolling-tip');
  cv.onmousemove = function(e) {
    const rect = cv.getBoundingClientRect();
    const mx   = e.clientX - rect.left;
    const i    = Math.round((mx - pad.l) / cW * (valid.length - 1));
    if(i < 0 || i >= valid.length) return;
    const p = valid[i];
    tip.style.opacity = '1';
    tip.style.left = Math.min(mx + 8, W - 160) + 'px';
    tip.style.top  = (sy(p.ritmo) - 28) + 'px';
    tip.textContent = p.label + ': Ritmo ' + p.ritmo + (p.partial ? ' (janela parcial)' : '');
  };
  cv.onmouseleave = () => tip.style.opacity = '0';
}

        <div class="pul-br"><div class="pul-dot" style="background:var(--copper)"></div><div class="pul-tr"><div class="pul-fi" style="width:${d.c*100}%;background:var(--copper)"></div></div><div class="pul-v" style="color:var(--copper)">${(d.c*100).toFixed(0)}</div></div>
        <div class="pul-br"><div class="pul-dot" style="background:var(--gold)"></div><div class="pul-tr"><div class="pul-fi" style="width:${d.p*100}%;background:var(--gold)"></div></div><div class="pul-v" style="color:var(--gold)">${(d.p*100).toFixed(0)}</div></div>
      </div>
    </div>`;
  });
}

function renderLTCharts(s) {
  const allSess = s.semanas.flatMap(w => w.sessoes);
  if(allSess.length < 2) return;

  // ── Weekly aggregates ────────────────────────────────
  const weeks = s.semanas.map((w, wi) => {
    const sess = w.sessoes;
    const avg = key => sess.reduce((a,x)=>a+(x[key]||0),0)/(sess.length||1);
    return {
      label: `S${wi+1}`,
      fullLabel: w.label || `Semana ${wi+1}`,
      avgIC:  avg('indice'),
      avgPSE: avg('pse'),
      avgN:   avg('n'),
      avgM:   avg('m'),
      avgMet: avg('met'),
      n: sess.length,
      empty: sess.length === 0,
    };
  });

  const GOLD = 'rgba(200,160,96,';
  const COPPER = 'rgba(160,112,64,';
  const C_N   = '#8a7060';  // neural — muted amber
  const C_M   = '#c8a060';  // mecânica — gold
  const C_MET = '#607848';  // metabólica — olive
  const BG    = '#0d0d0d';

  // ── Tooltip helper ───────────────────────────────────
  function makeTooltip(canvasId) {
    const tip = document.createElement('div');
    tip.style.cssText = `position:absolute;background:#161410;border:1px solid rgba(200,160,96,.3);
      color:rgba(200,160,96,.9);font-size:8px;padding:5px 9px;pointer-events:none;opacity:0;
      transition:opacity .1s;white-space:nowrap;font-family:'IBM Plex Mono',monospace;z-index:10;
      border-radius:1px;line-height:1.6`;
    const wrap = document.getElementById(canvasId).parentNode;
    wrap.style.position = 'relative';
    wrap.appendChild(tip);
    return tip;
  }

  // ── Canvas chart factory ─────────────────────────────
  function makeCanvas(containerId, h) {
    const wrap = document.getElementById(containerId);
    wrap.innerHTML = '';
    const canvas = document.createElement('canvas');
    canvas.height = h;
    canvas.style.cssText = 'display:block;width:100%;cursor:crosshair';
    wrap.appendChild(canvas);
    // Size canvas to container
    canvas.width = wrap.clientWidth || 360;
    return canvas;
  }

  // ═══════════════════════════════════════════════════
  // CHART 1 — IC + PSE (canvas, hover tooltip)
  // ═══════════════════════════════════════════════════
  const canvasIC = makeCanvas('lt-ic-chart', 110);
  const tipIC    = makeTooltip('lt-ic-chart');
  const ctxIC    = canvasIC.getContext('2d');

  function drawIC() {
    const W = canvasIC.width, H = canvasIC.height;
    const PAD = {t:18, r:16, b:28, l:48};
    const cW = W - PAD.l - PAD.r, cH = H - PAD.t - PAD.b;
    ctxIC.clearRect(0,0,W,H);

    const nonEmpty = weeks.filter(w=>!w.empty);
    if(nonEmpty.length < 2) return;
    const ICs  = nonEmpty.map(w=>w.avgIC);
    const PSEs = nonEmpty.map(w=>w.avgPSE);

    const loIC = Math.min(...ICs)*0.88, hiIC = Math.max(...ICs)*1.06;
    const loPSE = Math.min(...PSEs)-0.8, hiPSE = Math.max(...PSEs)+0.8;

    const sx = (i) => PAD.l + (i/(nonEmpty.length-1))*cW;
    const syIC  = (v) => PAD.t + cH - ((v-loIC)/(hiIC-loIC||1))*cH;
    const syPSE = (v) => PAD.t + cH - ((v-loPSE)/(hiPSE-loPSE||1))*cH;

    // Grid
    ctxIC.strokeStyle = 'rgba(200,160,96,.06)';
    ctxIC.lineWidth = 1;
    [0,.5,1].forEach(t => {
      const y = PAD.t + t*cH;
      ctxIC.beginPath(); ctxIC.moveTo(PAD.l,y); ctxIC.lineTo(W-PAD.r,y); ctxIC.stroke();
    });

    // Area under IC
    const grad = ctxIC.createLinearGradient(0,PAD.t,0,H-PAD.b);
    grad.addColorStop(0, 'rgba(200,160,96,.13)');
    grad.addColorStop(1, 'rgba(200,160,96,0)');
    ctxIC.beginPath();
    ctxIC.moveTo(sx(0), H-PAD.b);
    nonEmpty.forEach((w,i) => ctxIC.lineTo(sx(i), syIC(w.avgIC)));
    ctxIC.lineTo(sx(nonEmpty.length-1), H-PAD.b);
    ctxIC.closePath();
    ctxIC.fillStyle = grad; ctxIC.fill();

    // IC line
    ctxIC.beginPath();
    ctxIC.strokeStyle = 'rgba(200,160,96,.8)';
    ctxIC.lineWidth = 1.8;
    ctxIC.lineJoin = 'round';
    nonEmpty.forEach((w,i) => i===0 ? ctxIC.moveTo(sx(i),syIC(w.avgIC)) : ctxIC.lineTo(sx(i),syIC(w.avgIC)));
    ctxIC.stroke();

    // PSE line (dashed, mapped to IC scale visually just for shape reference)
    ctxIC.beginPath();
    ctxIC.strokeStyle = 'rgba(160,112,64,.5)';
    ctxIC.lineWidth = 1.3;
    ctxIC.setLineDash([4,3]);
    nonEmpty.forEach((w,i) => i===0 ? ctxIC.moveTo(sx(i),syPSE(w.avgPSE)) : ctxIC.lineTo(sx(i),syPSE(w.avgPSE)));
    ctxIC.stroke();
    ctxIC.setLineDash([]);

    // Dots IC
    nonEmpty.forEach((w,i) => {
      ctxIC.beginPath();
      ctxIC.arc(sx(i), syIC(w.avgIC), 3.5, 0, Math.PI*2);
      ctxIC.fillStyle = '#c8a060';
      ctxIC.strokeStyle = '#0d0d0d';
      ctxIC.lineWidth = 1.5;
      ctxIC.fill(); ctxIC.stroke();
    });

    // Y labels
    ctxIC.font = '500 7px IBM Plex Mono,monospace';
    ctxIC.fillStyle = 'rgba(200,160,96,.4)';
    ctxIC.textAlign = 'right';
    [loIC,(loIC+hiIC)/2,hiIC].forEach(v => {
      ctxIC.fillText(Math.round(v/1000)+'k', PAD.l-5, syIC(v)+3);
    });

    // X labels
    ctxIC.textAlign = 'center';
    ctxIC.fillStyle = 'rgba(200,160,96,.35)';
    ctxIC.font = '500 6.5px IBM Plex Mono,monospace';
    nonEmpty.forEach((w,i) => ctxIC.fillText(w.label, sx(i), H-6));

    // Legend
    ctxIC.fillStyle = 'rgba(200,160,96,.7)';
    ctxIC.fillRect(PAD.l, 6, 14, 2);
    ctxIC.fillStyle = 'rgba(200,160,96,.55)';
    ctxIC.font = '500 6.5px IBM Plex Mono,monospace';
    ctxIC.textAlign = 'left';
    ctxIC.fillText('IC', PAD.l+17, 10);
    ctxIC.strokeStyle = 'rgba(160,112,64,.5)';
    ctxIC.lineWidth = 1.3;
    ctxIC.setLineDash([4,3]);
    ctxIC.beginPath(); ctxIC.moveTo(PAD.l+36,8); ctxIC.lineTo(PAD.l+50,8); ctxIC.stroke();
    ctxIC.setLineDash([]);
    ctxIC.fillStyle = 'rgba(160,112,64,.5)';
    ctxIC.fillText('PSE', PAD.l+53, 10);

    // Store for hover
    canvasIC._weeks = nonEmpty;
    canvasIC._sx = sx; canvasIC._syIC = syIC;
    canvasIC._PAD = PAD;
  }

  drawIC();

  // IC hover
  canvasIC.addEventListener('mousemove', e => {
    const rect = canvasIC.getBoundingClientRect();
    const mx = (e.clientX - rect.left) * (canvasIC.width / rect.width);
    const ws = canvasIC._weeks; if(!ws) return;
    let closest = 0, minD = Infinity;
    ws.forEach((w,i) => { const d = Math.abs(canvasIC._sx(i)-mx); if(d<minD){minD=d;closest=i;} });
    if(minD > 30) { tipIC.style.opacity=0; return; }
    const w = ws[closest];
    tipIC.innerHTML = `<strong>${w.fullLabel}</strong><br>IC ${Math.round(w.avgIC).toLocaleString('pt-BR')} · PSE ${w.avgPSE.toFixed(1)} · ${w.n} sessão${w.n!==1?'s':''}`;
    const x = canvasIC._sx(closest) * (rect.width/canvasIC.width);
    const y = canvasIC._syIC(w.avgIC) * (rect.height/canvasIC.height);
    tipIC.style.left = (x+8)+'px';
    tipIC.style.top  = (y-18)+'px';
    tipIC.style.opacity = 1;
  });
  canvasIC.addEventListener('mouseleave', () => { tipIC.style.opacity=0; });

  // ═══════════════════════════════════════════════════
  // CHART 2 — Dimensional lines (canvas, hover tooltip)
  // ═══════════════════════════════════════════════════
  const canvasDim = makeCanvas('lt-dim-chart', 100);
  const tipDim    = makeTooltip('lt-dim-chart');
  const ctxDim    = canvasDim.getContext('2d');

  function drawDim() {
    const W = canvasDim.width, H = canvasDim.height;
    const PAD = {t:18, r:16, b:28, l:44};
    const cW = W - PAD.l - PAD.r, cH = H - PAD.t - PAD.b;
    ctxDim.clearRect(0,0,W,H);

    const nonEmpty = weeks.filter(w=>!w.empty);
    if(nonEmpty.length < 2) return;

    const allVals = nonEmpty.flatMap(w=>[w.avgN, w.avgM, w.avgMet]);
    const lo = Math.max(0, Math.min(...allVals)-0.05);
    const hi = Math.min(1, Math.max(...allVals)+0.05);

    const sx = (i) => PAD.l + (i/(nonEmpty.length-1))*cW;
    const sy = (v) => PAD.t + cH - ((v-lo)/(hi-lo||1))*cH;

    // Grid
    ctxDim.strokeStyle = 'rgba(200,160,96,.06)';
    ctxDim.lineWidth = 1;
    [0,.5,1].forEach(t => {
      const y = PAD.t + t*cH;
      ctxDim.beginPath(); ctxDim.moveTo(PAD.l,y); ctxDim.lineTo(W-PAD.r,y); ctxDim.stroke();
    });

    // Draw 3 lines
    const series = [
      {key:'avgN',   color:C_N,   label:'Neural'},
      {key:'avgM',   color:C_M,   label:'Mecânica'},
      {key:'avgMet', color:C_MET, label:'Metab.'},
    ];

    series.forEach(({key, color}) => {
      // Area
      const grad = ctxDim.createLinearGradient(0,PAD.t,0,H-PAD.b);
      grad.addColorStop(0, color+'28');
      grad.addColorStop(1, color+'00');
      ctxDim.beginPath();
      ctxDim.moveTo(sx(0), H-PAD.b);
      nonEmpty.forEach((w,i) => ctxDim.lineTo(sx(i), sy(w[key])));
      ctxDim.lineTo(sx(nonEmpty.length-1), H-PAD.b);
      ctxDim.closePath();
      ctxDim.fillStyle = grad; ctxDim.fill();

      // Line
      ctxDim.beginPath();
      ctxDim.strokeStyle = color;
      ctxDim.lineWidth = 1.6;
      ctxDim.lineJoin = 'round';
      nonEmpty.forEach((w,i) => i===0 ? ctxDim.moveTo(sx(i),sy(w[key])) : ctxDim.lineTo(sx(i),sy(w[key])));
      ctxDim.stroke();

      // Dots
      nonEmpty.forEach((w,i) => {
        ctxDim.beginPath();
        ctxDim.arc(sx(i), sy(w[key]), 2.8, 0, Math.PI*2);
        ctxDim.fillStyle = color;
        ctxDim.strokeStyle = '#0d0d0d';
        ctxDim.lineWidth = 1.2;
        ctxDim.fill(); ctxDim.stroke();
      });
    });

    // Y labels (%)
    ctxDim.font = '500 7px IBM Plex Mono,monospace';
    ctxDim.fillStyle = 'rgba(200,160,96,.4)';
    ctxDim.textAlign = 'right';
    [lo, (lo+hi)/2, hi].forEach(v => {
      ctxDim.fillText(Math.round(v*100)+'%', PAD.l-4, sy(v)+3);
    });

    // X labels
    ctxDim.textAlign = 'center';
    ctxDim.font = '500 6.5px IBM Plex Mono,monospace';
    ctxDim.fillStyle = 'rgba(200,160,96,.35)';
    nonEmpty.forEach((w,i) => ctxDim.fillText(w.label, sx(i), H-6));

    // Legend
    const lx = PAD.l;
    series.forEach(({color,label},i) => {
      const x = lx + i*62;
      ctxDim.fillStyle = color;
      ctxDim.fillRect(x, 5, 12, 2);
      ctxDim.font = '500 6.5px IBM Plex Mono,monospace';
      ctxDim.textAlign = 'left';
      ctxDim.fillStyle = color+'cc';
      ctxDim.fillText(label, x+15, 10);
    });

    canvasDim._weeks = nonEmpty;
    canvasDim._sx = sx; canvasDim._sy = sy;
    canvasDim._series = series;
    canvasDim._PAD = PAD;
  }

  drawDim();

  // Dim hover
  canvasDim.addEventListener('mousemove', e => {
    const rect = canvasDim.getBoundingClientRect();
    const mx = (e.clientX - rect.left) * (canvasDim.width / rect.width);
    const ws = canvasDim._weeks; if(!ws) return;
    let closest = 0, minD = Infinity;
    ws.forEach((w,i) => { const d = Math.abs(canvasDim._sx(i)-mx); if(d<minD){minD=d;closest=i;} });
    if(minD > 30) { tipDim.style.opacity=0; return; }
    const w = ws[closest];
    tipDim.innerHTML = `<strong>${w.fullLabel}</strong><br>`+
      `<span style="color:${C_N}">N ${(w.avgN*100).toFixed(0)}%</span>  `+
      `<span style="color:${C_M}">M ${(w.avgM*100).toFixed(0)}%</span>  `+
      `<span style="color:${C_MET}">Met ${(w.avgMet*100).toFixed(0)}%</span>`;
    const x = canvasDim._sx(closest) * (rect.width/canvasDim.width);
    tipDim.style.left = (x+8)+'px';
    tipDim.style.top  = '2px';
    tipDim.style.opacity = 1;
  });
  canvasDim.addEventListener('mouseleave', () => { tipDim.style.opacity=0; });

  // ── Highlights ────────────────────────────────────────
  const nonEmptyWeeks = weeks.filter(w=>!w.empty);
  const ICs = nonEmptyWeeks.map(w=>w.avgIC);
  const trend = ICs[ICs.length-1] - ICs[0];
  const trendPct = ((trend / (ICs[0]||1)) * 100).toFixed(0);
  const bestWeek = nonEmptyWeeks.reduce((a,b) => a.avgIC > b.avgIC ? a : b);
  const bestEfficiency = nonEmptyWeeks.reduce((a,b) => (a.avgIC/(a.avgPSE||1)) > (b.avgIC/(b.avgPSE||1)) ? a : b);
  const maxStreak = (() => {
    let streak=1,max=1;
    for(let i=1;i<ICs.length;i++){if(ICs[i]>ICs[i-1])streak++;else streak=1;max=Math.max(max,streak);}
    return max;
  })();
  const dimDom = nonEmptyWeeks.map(w => {
    const d = {N:w.avgN,M:w.avgM,Met:w.avgMet};
    return Object.entries(d).sort((a,b)=>b[1]-a[1])[0][0];
  });
  const dimCount = dimDom.reduce((acc,d)=>{acc[d]=(acc[d]||0)+1;return acc;},{});
  const domDim = Object.entries(dimCount).sort((a,b)=>b[1]-a[1])[0];
  const dimLabel = {N:'Neural',M:'Mecânica',Met:'Metabólica'};
  const dimColor = {N:C_N, M:C_M, Met:C_MET};

  document.getElementById('lt-highlights').innerHTML = `
    <div class="lt-hl-row">
      <div class="lt-hl ${trend>=0?'pos':'neg'}">
        <div class="lt-hl-val">${trend>=0?'+':''}${trendPct}%</div>
        <div class="lt-hl-lbl">Progressão IC</div>
        <div class="lt-hl-sub">${trend>=0?'Crescimento':'Queda'} início→fim</div>
      </div>
      <div class="lt-hl pos">
        <div class="lt-hl-val">${bestWeek.label}</div>
        <div class="lt-hl-lbl">Melhor semana</div>
        <div class="lt-hl-sub">IC ${Math.round(bestWeek.avgIC).toLocaleString('pt-BR')}</div>
      </div>
      <div class="lt-hl">
        <div class="lt-hl-val">${maxStreak}</div>
        <div class="lt-hl-lbl">Sequência</div>
        <div class="lt-hl-sub">semanas crescendo</div>
      </div>
      <div class="lt-hl" style="color:${domDim?dimColor[domDim[0]]:'var(--copper)'}">
        <div class="lt-hl-val">${domDim?dimLabel[domDim[0]]:'—'}</div>
        <div class="lt-hl-lbl">Dimensão dominante</div>
        <div class="lt-hl-sub">${domDim?domDim[1]+' de '+nonEmptyWeeks.length+' semanas':'—'}</div>
      </div>
    </div>`;
}

function setScenario(id) {
  currentScenarioId = id;
  document.querySelectorAll('.wg-st').forEach((el,i)=>{
    const sc=SCENARIOS[i];
    el.classList.toggle('active',sc.id===id);
    el.querySelector('.wg-st-name').style.color=sc.id===id?sc.color:'var(--ink)';
    el.querySelector('.wg-st-bar').style.display=sc.id===id?'block':'none';
  });
  renderAnalysis();
}

// ─── Exercise bank ───────────────────────────────────
function renderExGroups() {
  document.getElementById('ex-grps').innerHTML = EX_GROUPS.map(g=>`
    <button class="ex-grp ${g===exFilter?'on':''}" onclick="setExFilter('${g}')">${g==='Todos'?'Todos':g.split('·')[1]?.trim()||g}</button>
  `).join('');
}
function setExFilter(g) {
  exFilter=g;
  document.querySelectorAll('.ex-grp').forEach((el,i)=>el.classList.toggle('on',EX_GROUPS[i]===g));
  renderExList();
}
function filterEx(q) { exQuery=q; renderExList(); }
function renderExList() {
  const q=exQuery.toLowerCase();
  const already=new Set(workoutItems.map(w=>w.ex.id));
  const filtered=EXERCISES.filter(ex=>{
    const gm=exFilter==='Todos'||ex.group===exFilter;
    const sm=!q||ex.name.toLowerCase().includes(q)||ex.group.toLowerCase().includes(q);
    return gm&&sm;
  });
  document.getElementById('ex-list').innerHTML=filtered.map(ex=>`
    <div class="ex-item ${already.has(ex.id)?'already':''}" onclick="addEx('${ex.id}')">
      <div class="ex-item-ico">${ex.icon}</div>
      <div class="ex-item-info"><div class="ex-item-name">${ex.name}</div><div class="ex-item-grp">${ex.group}</div></div>
      <div class="ex-item-add">+</div>
    </div>
  `).join('');
}

// ─── Exercise add ─────────────────────────────────────
function addEx(exId) {
  if(workoutItems.find(w=>w.ex.id===exId)) return;
  const ex=EXERCISES.find(e=>e.id===exId);
  const sc=SCENARIOS.find(s=>s.id===currentScenarioId);
  const stypeDefaults={forca:'forca_max',hiper:'hipertrofia',tecnica:'tecnica',densidade:'resistencia'};
  let defStype=stypeDefaults[currentScenarioId]||'hipertrofia';
  // RN30: se o tipo padrão estiver bloqueado para este exercício, escolhe o primeiro disponível
  if(getStypeValidation(ex, defStype).status==='locked') {
    defStype = SERIES_TYPES.find(st=>getStypeValidation(ex,st.id).status!=='locked')?.id || 'hipertrofia';
  }
  const st=SERIES_TYPES.find(s=>s.id===defStype);
  // Pre-estimate kg from RM
  const {kg: suggestedKg} = suggestKgForZone(exId, st.zone);
  workoutItems.push({
    uid:newUID(), ex,
    blocks:[{stypeId:defStype, zone:st.zone, sets:3, reps:st.reps_def, kg:suggestedKg, pse:8}]
  });
  renderBuild();
  renderAnalysis();
  renderExList();
}

// ─── Build render ─────────────────────────────────────
function renderBuild() {
  const buildEl=document.getElementById('wg-build');
  // Remove existing cards
  buildEl.querySelectorAll('.ex-card').forEach(c=>c.remove());
  const emptyEl=document.getElementById('wg-empty');
  const countEl=document.getElementById('wg-count');
  if(workoutItems.length===0){
    emptyEl.style.display='block';
    countEl.textContent='';
    document.getElementById('btn-export').disabled=true;
    return;
  }
  emptyEl.style.display='none';
  countEl.textContent=`${workoutItems.length} exercício${workoutItems.length!==1?'s':''}`;
  document.getElementById('btn-export').disabled=false;
  const topEl=buildEl.querySelector('.wg-build-top');
  workoutItems.forEach((item,idx)=>{
    const card=buildExCard(item,idx);
    buildEl.appendChild(card);
  });
}

function buildExCard(item, idx) {
  const card=document.createElement('div');
  card.className='ex-card';
  card.id=`card-${item.uid}`;
  card.draggable=true;
  card.addEventListener('dragstart', e=>{dragSrcUid=item.uid;card.classList.add('dragging');e.dataTransfer.effectAllowed='move';});
  card.addEventListener('dragend', ()=>card.classList.remove('dragging'));
  card.addEventListener('dragover', e=>{e.preventDefault();card.classList.add('drag-over');});
  card.addEventListener('dragleave', ()=>card.classList.remove('drag-over'));
  card.addEventListener('drop', e=>{
    e.preventDefault();card.classList.remove('drag-over');
    if(dragSrcUid && dragSrcUid!==item.uid){
      if(isMesoItem(item.uid)){
        const t=getMesoSessaoKey(item.uid)||mesoState.activeSessao;
        const arr=mesoState.sessoes[t]||[];
        const srcIdx=arr.findIndex(w=>w.uid===dragSrcUid);
        const dstIdx=arr.findIndex(w=>w.uid===item.uid);
        if(srcIdx>-1&&dstIdx>-1){const [mv]=arr.splice(srcIdx,1);arr.splice(dstIdx,0,mv);renderMcBuild();renderMcAnalysis();}
      } else {
        const srcIdx=workoutItems.findIndex(w=>w.uid===dragSrcUid);
        const dstIdx=workoutItems.findIndex(w=>w.uid===item.uid);
        if(srcIdx>-1&&dstIdx>-1){const [mv]=workoutItems.splice(srcIdx,1);workoutItems.splice(dstIdx,0,mv);renderBuild();renderAnalysis();}
      }
    }
    dragSrcUid=null;
  });
  card.addEventListener('mouseenter',()=>{hoveredExUid=item.uid; if(isMesoItem(item.uid)){mcHoveredUid=item.uid;renderMcAnalysisRadar();}else renderAnalysis(true);});
  card.addEventListener('mouseleave',()=>{hoveredExUid=null; if(isMesoItem(item.uid)){mcHoveredUid=null;renderMcAnalysisRadar();}else renderAnalysis(true);});
  // Header
  let html=`
    <div class="ex-card-head">

  `;
  // Series type pills + spec row (for primary block stype)
  const primaryStype=SERIES_TYPES.find(s=>s.id===item.blocks[0].stypeId)||SERIES_TYPES[3];
  html+=`
    <div class="stypes">
      <div class="stypes-label">Tipo de série</div>
      <div class="stype-pills">
        ${SERIES_TYPES.map(st=>{
          const isOn = st.id===item.blocks[0].stypeId;
          const val = getStypeValidation(item.ex, st.id);
          const isLocked = val.status==='locked';
          const isSoft   = val.status==='soft';
          const isWarn   = val.status==='warn';
          let pillStyle = '';
          let pillExtra = '';
          if(isOn) {
            pillStyle=`background:${st.color}66;border-color:${st.color};color:#fff`;
          } else if(isLocked) {
            pillStyle=`opacity:.35;cursor:not-allowed;border-color:rgba(192,64,64,.3);color:rgba(200,120,120,.6)`;
            pillExtra=` title="${val.reason}"`;
          } else if(isSoft) {
            pillStyle=`border-color:rgba(200,140,60,.4);color:rgba(200,140,60,.65)`;
            pillExtra=` title="${val.reason}"`;
          } else if(isWarn) {
            pillStyle=`border-color:rgba(200,160,60,.35);color:rgba(200,160,96,.7)`;
            pillExtra=` title="${val.reason}"`;
          }
          const lockIcon = isLocked ? '⛔ ' : isSoft ? '⚠ ' : isWarn ? '△ ' : '';
          return `<div class="stype-pill ${isOn?'on':''} ${isLocked?'pill-locked':''}"
               style="${pillStyle}"${pillExtra}
               onclick="setBlockStype('${item.uid}',0,'${st.id}')"
               onmouseenter="${isLocked?'':`previewStype('${item.uid}','${st.id}')`}"
               onmouseleave="${isLocked?'':`previewStype('${item.uid}',null)`}">${lockIcon}${st.label}</div>`;
        }).join('')}
      </div>
      <div class="stype-spec" id="spec-${item.uid}">
        ${renderStypeSpec(primaryStype)}

    </div>
  `;
  // Blocks
  item.blocks.forEach((block,bi)=>{

  });
  // Add block button (only if single block)
  if(item.blocks.length===1){
    html+=`<div style="padding:4px 10px 8px">
      <button class="add-block-btn" onclick="addBlock('${item.uid}')">+ Adicionar bloco complementar (back-off / drop set)</button>
    </div>`;
  }
  card.innerHTML=html;
  return card;
}

// ─── RN30 — Compatibilidade exercício × valência ──────
// Mapeia stypeId → label da valência para checar locked_valences
const STYPE_VALENCE_MAP = {
  forca_max:'Força Máxima', potencia:'Potência', tecnica:'Técnica',
  hipertrofia:'Hipertrofia', excentrica:'Excêntrica',
  resistencia:'Resistência', backoff:'Back-off'
};

// Isolamentos monoarticulares — sem Força Máxima nem Potência
const MONO_IDS = ['extensora','flexora_d','flexora_p','adutora','abdutora',
  'peck','crucifixo','rosca','rosca_m','rosca_scott','rosca_conc',
  'triceps_p','triceps_f','triceps_coice','elev_lat','elev_post','gluteo4',
  'pant_pe','pant_sentado','crossover','straight_arm'];

function getStypeValidation(ex, stypeId) {
  const valLabel = STYPE_VALENCE_MAP[stypeId];
  if(!valLabel || !ex) return {status:'ok'};

  // ── Camada 1: locked_valences absolutas (campo no banco) ──
  const locked = ex.locked_valences || [];
  if(locked.includes(valLabel)) {
    const reasons = {
      'Potência':    ex.unit==='time'  ? 'Exercício isométrico — sem fase concêntrica para expressar potência.'
                   :ex.unit==='distance'? 'Carries não têm 1RM equivalente para potência máxima.'
                   :ex.explos===1       ? 'Movimento balístico — fase excêntrica não é controlável neste padrão.'
                   :'Estrutura biomecânica incompatível com Potência.',
      'Excêntrica':  ex.unit==='time'  ? 'Exercício isométrico — sem movimento discreto para fase excêntrica.'
                   :ex.explos===1       ? 'Movimento balístico — fase excêntrica indefinível em padrão explosivo.'
                   :'Excêntrica requer reps discretas com controle de descida.',
      'Back-off':    'Back-off exige série anterior de referência — incompatível com este padrão.',
      'Força Máxima':ex.unit==='distance'? 'Carries não têm 1RM mensurável — carga limitada pelo grip, não pela força.'
                   :MONO_IDS.includes(ex.id)? 'Isolamento monoarticular — carga máxima sobrecarrega a articulação antes do SNC.'
                   :'Estrutura incompatível com Força Máxima.',
      'Resistência': 'Olímpicos com alto volume colapsam a técnica — risco de lesão aumenta progressivamente após 5–6 reps.',
    };
    return {status:'locked', reason: reasons[valLabel] || `Valência bloqueada para este tipo de exercício.`};
  }

  // ── Camada 1b: isolamento mono sem locked_valences explícito ──
  if(MONO_IDS.includes(ex.id) && (stypeId==='forca_max'||stypeId==='potencia')) {
    return {status:'locked', reason:'Isolamento monoarticular — carga máxima sobrecarrega a articulação antes do SNC.'};
  }

  // ── Camada 2: soft locks por coeficiente (override com confirmação) ──
  const CT = ex.CT||0, SV = ex.SV||0;
  if(stypeId==='forca_max' && CT < 3) {
    return {status:'soft', reason:`CT ${CT} — Complexidade técnica insuficiente para carga máxima. O fator limitante será a articulação, não o SNC. Confirmar para sobrescrever.`};
  }
  if(stypeId==='forca_max' && CT < 4) {
    return {status:'warn', reason:`CT ${CT} — Aviso: estrutura técnica limitada para Força Máxima. O fator limitante pode ser o grip ou a posição antes do músculo-alvo.`};
  }
  if(stypeId==='potencia' && SV < 4) {
    return {status:'warn', reason:`SV ${SV} — Baixo potencial explosivo. Este exercício não tem estrutura biomecânica para gerar potência transferível.`};
  }

  // ── Camada 3: avisos contextuais por combinação ──
  const DN = ex.DN||0;
  if(stypeId==='excentrica' && DN > 8) {
    return {status:'warn', reason:`DN ${DN} — Alto dano mecânico base. Excêntrica amplifica significativamente. Considere máx. 1× por semana e monitore PSE nas 48h seguintes.`};
  }
  if(stypeId==='forca_max' && DN > 7) {
    return {status:'warn', reason:`DN ${DN} — Exercício exige 48–72h de recuperação neural e mecânica. Evite o mesmo grupo na sessão seguinte.`};
  }

  return {status:'ok'};
}

// Block interactions
function setBlockStype(uid, bi, stypeId) {
  const item=findItem(uid); if(!item) return;
  const st=SERIES_TYPES.find(s=>s.id===stypeId); if(!st) return;
  const val = getStypeValidation(item.ex, stypeId);

  // Camada 1: bloqueio absoluto — não deixa selecionar
  if(val.status==='locked') {
    showStypeLockMsg(uid, val.reason, false);
    return;
  }
  // Camada 2: soft lock — pede confirmação
  if(val.status==='soft') {
    showStypeLockMsg(uid, val.reason, true, ()=>{
      _applyBlockStype(item, bi, st);
    });
    return;
  }
  // Camada 3: aviso — aplica mas mostra alerta
  if(val.status==='warn') {
    _applyBlockStype(item, bi, st);
    showStypeWarnToast(item.ex.name, val.reason);
    return;
  }
  _applyBlockStype(item, bi, st);
}

function _applyBlockStype(item, bi, st) {
  item.blocks[bi].stypeId=st.id;
  item.blocks[bi].zone=st.zone;
  item.blocks[bi].reps=st.reps_def;
  const cardEl=document.getElementById(`card-${item.uid}`);
  if(cardEl){ const newCard=buildExCard(item); cardEl.replaceWith(newCard); }
  renderAnalysis();
}

function showStypeLockMsg(uid, reason, canOverride, onConfirm) {
  // Injeta mensagem inline abaixo dos pills
  const existing = document.getElementById(`lock-msg-${uid}`);
  if(existing) existing.remove();
  const el = document.createElement('div');
  el.id = `lock-msg-${uid}`;
  el.style.cssText='margin:6px 12px 0;padding:9px 11px;border-left:2px solid #c04040;background:rgba(192,64,64,.07);font-size:12px;color:rgba(220,140,140,.9);line-height:1.7;display:flex;align-items:flex-start;gap:8px';
  el.innerHTML = `<span style="color:#c06060;flex-shrink:0">⛔</span><div>${reason}${canOverride?`<br><span style="color:rgba(200,160,96,.7);cursor:pointer;text-decoration:underline" onclick="(${onConfirm.toString()})();document.getElementById('lock-msg-${uid}').remove()">Sobrescrever mesmo assim →</span>`:''}</div>`;
  const card = document.getElementById(`card-${uid}`);
  if(card){
    const pillsEl = card.querySelector('.stype-pills');
    if(pillsEl) pillsEl.parentNode.insertBefore(el, pillsEl.nextSibling);
  }
  setTimeout(()=>{if(el.parentNode)el.remove();},6000);
}

function showStypeWarnToast(exName, reason) {

    toast.id='stype-warn-toast';
    toast.style.cssText='position:fixed;bottom:24px;right:24px;max-width:340px;padding:12px 16px;background:#1e1810;border:1px solid rgba(200,160,96,.25);border-left:3px solid #c08020;font-size:12.5px;color:rgba(200,160,96,.8);line-height:1.8;z-index:9999;transition:opacity .3s';
    document.body.appendChild(toast);
  }
  toast.innerHTML = `<strong style="color:var(--gold)">⚠ ${exName}</strong><br>${reason}`;
  toast.style.opacity='1';
  clearTimeout(toast._t);

}
