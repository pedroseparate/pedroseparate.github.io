<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Momentum · PT Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet">

<style>
/* ── TOKENS ─────────────────────────────────────────── */
:root {
  --cream: #f7f3eb; --cream2: #f0ead8; --cream3: #e8e0cc;
  --ink: #1a1410;   --ink2: #6a5848;   --ink3: #a89070; --ink4: #c8b090;
  --copper: #8a6030; --copper2: #a07840; --gold: #c8a060; --gold2: #e0bc80;
  --dark: #1e1812;   --dark2: #261e14;  --dark3: #2e2618;
  --b: rgba(26,20,16,.10); --b2: rgba(26,20,16,.18);
  --bg: rgba(200,160,96,.18); --bg2: rgba(200,160,96,.30);
  --z-leve: #608040; --z-mod: #a07040; --z-pesado: #8a6030; --z-max: #6a3020;
  --nav-h: 56px; --header-h: 48px;
}

/* ── RESET ──────────────────────────────────────────── */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; background: var(--cream); color: var(--ink); }
body {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 13px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* ── SHELL ──────────────────────────────────────────── */
#app {
  width: 100%;
  max-width: 480px;
  min-height: 100%;
  display: flex;
  flex-direction: column;
  position: relative;
  background: var(--cream);
}

/* ── HEADER ─────────────────────────────────────────── */
#header {
  height: var(--header-h);
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  background: var(--dark);
  border-bottom: 1px solid rgba(200,160,96,.08);
  position: sticky;
  top: 0;
  z-index: 100;
}
.hd-logo {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-weight: 600;
  font-size: 18px;
  color: var(--gold);
  letter-spacing: .01em;
}
.hd-logo span {
  font-size: 7px;
  font-style: normal;
  font-weight: 400;
  font-family: 'IBM Plex Mono', monospace;
  text-transform: uppercase;
  letter-spacing: .18em;
  color: rgba(200,160,96,.25);
  display: block;
  margin-top: 1px;
}
#hd-student-btn {
  display: flex;
  align-items: center;
  gap: 7px;
  cursor: pointer;
  padding: 5px 10px;
  border: 1px solid rgba(200,160,96,.12);
  border-radius: 2px;
  transition: border-color .15s;
  background: transparent;
  max-width: 200px;
}
#hd-student-btn:hover { border-color: rgba(200,160,96,.3); }
#hd-student-name {
  font-size: 9px;
  font-weight: 500;
  color: rgba(200,160,96,.75);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 120px;
  font-family: 'IBM Plex Mono', monospace;
}
.hd-chevron {
  font-size: 8px;
  color: rgba(200,160,96,.3);
  flex-shrink: 0;
}

/* ── MAIN ───────────────────────────────────────────── */
#main {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding-bottom: calc(var(--nav-h) + 12px);
  -webkit-overflow-scrolling: touch;
}

/* ── BOTTOM NAV ─────────────────────────────────────── */
#bottom-nav {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 480px;
  height: var(--nav-h);
  background: var(--dark);
  border-top: 1px solid rgba(200,160,96,.08);
  display: flex;
  align-items: stretch;
  z-index: 100;
}
.nav-tab {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  cursor: pointer;
  transition: all .15s;
  border: none;
  background: transparent;
  color: rgba(200,160,96,.28);
  font-family: 'IBM Plex Mono', monospace;
}
.nav-tab:hover { color: rgba(200,160,96,.55); }
.nav-tab.active { color: var(--gold); }
.nav-tab .nt-icon { font-size: 16px; line-height: 1; }
.nav-tab .nt-label {
  font-size: 7px;
  text-transform: uppercase;
  letter-spacing: .12em;
}

/* ── VIEWS ──────────────────────────────────────────── */
.view { display: none; padding: 16px; }
.view.active { display: block; }

/* ── LOADING / EMPTY ────────────────────────────────── */
#loading {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 64px 24px;
  gap: 12px;
  color: rgba(200,160,96,.35);
}
.ld-mark {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 32px;
  color: var(--gold);
  animation: ldpulse 1.8s ease infinite;
}
@keyframes ldpulse { 0%,100%{opacity:.4} 50%{opacity:1} }
.ld-text { font-size: 9px; text-transform: uppercase; letter-spacing: .18em; }

/* ── STUDENT PICKER ─────────────────────────────────── */
#picker-overlay {
  position: fixed;
  inset: 0;
  z-index: 200;
  display: none;
}
#picker-overlay.open { display: block; }
.picker-backdrop {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,.5);
}
.picker-sheet {
  position: absolute;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 480px;
  background: var(--dark2);
  border-top: 1px solid rgba(200,160,96,.12);
  border-radius: 8px 8px 0 0;
  max-height: 70vh;
  overflow-y: auto;
  padding-bottom: 24px;
}
.picker-title {
  padding: 16px 18px 10px;
  font-size: 7px;
  text-transform: uppercase;
  letter-spacing: .2em;
  color: rgba(200,160,96,.3);
  border-bottom: 1px solid rgba(200,160,96,.07);
}
.picker-item {
  padding: 12px 18px;
  display: flex;
  align-items: center;
  gap: 12px;
  cursor: pointer;
  transition: background .12s;
  border-bottom: 1px solid rgba(200,160,96,.04);
}
.picker-item:hover { background: rgba(200,160,96,.04); }
.picker-item.active { background: rgba(200,160,96,.07); }
.pi-av {
  width: 32px; height: 32px;
  border-radius: 50%;
  background: var(--dark3);
  display: flex; align-items: center; justify-content: center;
  font-size: 8px; font-weight: 500; color: var(--gold);
  border: 1px solid rgba(200,160,96,.15);
  flex-shrink: 0;
}
.pi-name { font-size: 10px; font-weight: 500; color: rgba(200,160,96,.8); }
.pi-meta { font-size: 7px; color: rgba(200,160,96,.28); margin-top: 1px; text-transform: uppercase; letter-spacing: .06em; }
.pi-score {
  margin-left: auto;
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-weight: 600;
  font-size: 20px;
  color: rgba(200,160,96,.5);
}

/* ── CARDS / KPI ────────────────────────────────────── */
.kpi-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px; }
.kpi-card {
  background: var(--cream);
  border: 1px solid var(--b2);
  padding: 12px 14px;
}
.kpi-lbl { font-size: 7px; text-transform: uppercase; letter-spacing: .18em; color: var(--ink3); margin-bottom: 5px; }
.kpi-val {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-weight: 600;
  font-size: 24px;
  line-height: 1;
  color: var(--copper);
}
.kpi-sub { font-size: 7px; color: var(--ink3); margin-top: 4px; }

/* score display */
.score-display { display: flex; align-items: baseline; gap: 1px; }
.score-i { font-family: 'IBM Plex Mono', monospace; font-style: italic; font-weight: 300; font-size: 32px; line-height: 1; color: var(--gold); }
.score-dot { font-family: 'IBM Plex Mono', monospace; font-weight: 300; font-size: 18px; color: rgba(200,160,96,.28); }
.score-f { font-family: 'IBM Plex Mono', monospace; font-style: italic; font-weight: 300; font-size: 20px; color: rgba(200,160,96,.55); }

/* ── SECTION HEADERS ────────────────────────────────── */
.sec-head {
  font-size: 7px;
  text-transform: uppercase;
  letter-spacing: .18em;
  color: var(--ink3);
  margin-bottom: 10px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--b);
}

/* ── CHART CARDS ────────────────────────────────────── */
.chart-card {
  background: var(--cream);
  border: 1px solid var(--b2);
  padding: 14px;
  margin-bottom: 12px;
  position: relative;
}
.chart-card-title {
  font-size: 7px;
  text-transform: uppercase;
  letter-spacing: .16em;
  color: var(--ink3);
  margin-bottom: 12px;
}
.chart-wrap { position: relative; width: 100%; }

/* ── LT HIGHLIGHTS ──────────────────────────────────── */
.lt-hl-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 12px; }
.lt-hl { padding: 10px 12px; border: 1px solid var(--b); }
.lt-hl.pos .lt-hl-val { color: var(--z-leve); }
.lt-hl.neg .lt-hl-val { color: #c86030; }
.lt-hl-val { font-family: 'Cormorant Garamond', serif; font-style: italic; font-weight: 600; font-size: 20px; color: var(--copper); }
.lt-hl-lbl { font-size: 7px; text-transform: uppercase; letter-spacing: .12em; color: var(--ink3); margin-top: 2px; }
.lt-hl-sub { font-size: 7px; color: var(--ink4); margin-top: 2px; }

/* ── PULSO ROWS ─────────────────────────────────────── */
.pul-rows { border: 1px solid var(--b); padding: 12px 14px; }
.pul-row { display: flex; align-items: center; gap: 8px; padding: 5px 0; border-bottom: 1px solid var(--b); }
.pul-row:last-child { border-bottom: none; }
.pul-lbl { font-size: 7px; color: var(--ink3); width: 38px; flex-shrink: 0; }
.pul-bars { flex: 1; display: flex; flex-direction: column; gap: 3px; }
.pul-br { display: flex; align-items: center; gap: 5px; }
.pul-dot { width: 4px; height: 4px; border-radius: 50%; flex-shrink: 0; }
.pul-tr { flex: 1; height: 2px; background: var(--b2); overflow: hidden; }
.pul-fi { height: 100%; transition: width .5s ease; }
.pul-v { font-size: 7px; width: 22px; text-align: right; flex-shrink: 0; }

/* ── RITMO BADGE ────────────────────────────────────── */
.ritmo-badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 7px;
  padding: 3px 8px;
  border: 1px solid;
  border-radius: 1px;
  margin-top: 4px;
}
.rb-dot { width: 5px; height: 5px; border-radius: 50%; animation: rbp 2s ease infinite; }
@keyframes rbp { 0%,100%{opacity:1} 50%{opacity:.3} }

/* ── SESSIONS VIEW ──────────────────────────────────── */
.week-block { border: 1px solid var(--b); margin-bottom: 10px; }
.week-head {
  padding: 10px 14px;
  background: var(--cream2);
  display: flex;
  align-items: center;
  justify-content: space-between;
  cursor: pointer;
  border-bottom: 1px solid var(--b);
  font-size: 8px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: .1em;
}
.week-head:hover { background: var(--cream3); }
.week-body { display: none; }
.week-body.open { display: flex; flex-direction: column; gap: 1px; background: var(--b); }
.sess-card {
  background: var(--cream);
  padding: 12px 14px;
  cursor: pointer;
  transition: background .12s;
}
.sess-card:hover { background: var(--cream2); }
.sess-top { display: flex; justify-content: space-between; margin-bottom: 6px; }
.sess-tipo { font-size: 7px; text-transform: uppercase; letter-spacing: .12em; color: var(--copper); }
.sess-data { font-size: 7px; color: var(--ink3); }
.sess-ic {
  display: flex;
  align-items: baseline;
  gap: 1px;
  margin-bottom: 6px;
}
.sess-ic-i { font-family: 'IBM Plex Mono', monospace; font-style: italic; font-weight: 300; font-size: 22px; color: var(--gold); }
.sess-ic-d { font-family: 'IBM Plex Mono', monospace; font-style: italic; font-weight: 300; font-size: 13px; color: rgba(200,160,96,.4); }
.sess-bars { display: flex; flex-direction: column; gap: 3px; }
.sess-br { display: flex; align-items: center; gap: 5px; }
.sess-bl { font-size: 7px; color: var(--ink3); width: 48px; flex-shrink: 0; }
.sess-bt { flex: 1; height: 2px; background: var(--b2); overflow: hidden; }
.sess-bf { height: 100%; }
.sess-exs { margin-top: 8px; border-top: 1px solid var(--b); padding-top: 6px; }
.sess-ex { display: flex; justify-content: space-between; padding: 3px 0; border-bottom: 1px solid var(--b); font-size: 7px; }
.sess-ex:last-child { border: none; }
.sess-pse { margin-top: 6px; display: flex; justify-content: space-between; font-size: 7px; color: var(--ink3); }

/* ── WORKOUT VIEW ───────────────────────────────────── */
.wg-placeholder {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 48px 24px;
  text-align: center;
  gap: 12px;
}
.wg-icon { font-size: 32px; }
.wg-title {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 22px;
  color: var(--copper);
}
.wg-desc { font-size: 9px; color: var(--ink3); line-height: 1.7; max-width: 280px; }

/* ── ZONE PILL ──────────────────────────────────────── */
.zone-pill {
  display: inline-block;
  font-size: 6px;
  text-transform: uppercase;
  letter-spacing: .1em;
  padding: 2px 6px;
  border-radius: 1px;
  font-weight: 500;
}

/* ── SESSION DETAIL MODAL ───────────────────────────── */
#sd-overlay {
  position: fixed;
  inset: 0;
  z-index: 300;
  display: none;
  background: rgba(0,0,0,.6);
}
#sd-overlay.open { display: flex; flex-direction: column; align-items: center; justify-content: flex-end; }
#sd-panel {
  width: 100%;
  max-width: 480px;
  max-height: 92vh;
  overflow-y: auto;
  background: var(--cream);
  border-radius: 8px 8px 0 0;
  border-top: 1px solid rgba(200,160,96,.15);
}
.sd-header {
  position: sticky;
  top: 0;
  background: var(--dark2);
  padding: 14px 16px;
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  border-bottom: 1px solid rgba(200,160,96,.08);
  z-index: 10;
}
.sd-header-tipo { font-size: 7px; text-transform: uppercase; letter-spacing: .16em; color: rgba(200,160,96,.35); margin-bottom: 3px; }
.sd-header-name { font-family: 'Cormorant Garamond', serif; font-style: italic; font-weight: 600; font-size: 20px; color: var(--gold); }
.sd-header-meta { font-size: 7px; color: rgba(200,160,96,.35); margin-top: 3px; }
.sd-close {
  background: none; border: none; cursor: pointer;
  font-size: 20px; color: rgba(200,160,96,.4); line-height: 1; padding: 2px 4px;
}
.sd-close:hover { color: var(--gold); }
.sd-body { padding: 16px; }
.sd-sec-lbl { font-size: 7px; text-transform: uppercase; letter-spacing: .16em; color: var(--ink3); margin-bottom: 10px; margin-top: 16px; padding-bottom: 5px; border-bottom: 1px solid var(--b); }
.sd-sec-lbl:first-child { margin-top: 0; }

/* IC summary */
.sd-ic-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 14px;
  border: 1px solid var(--b2);
  background: var(--cream2);
  margin-bottom: 14px;
}
.sd-ic-val {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-weight: 600;
  font-size: 28px;
  color: rgba(200,160,96,.85);
}
.sd-ic-lbl { font-size: 7px; text-transform: uppercase; letter-spacing: .14em; color: var(--ink3); }
.sd-ic-vs { font-size: 8px; }

/* exercise cards in detail */
.sd-ex-card {
  border: 1px solid var(--b);
  margin-bottom: 8px;
  transition: border-color .12s;
}
.sd-ex-card:hover { border-color: rgba(200,160,96,.25); }
.sd-ex-head { padding: 10px 12px; display: flex; align-items: center; gap: 10px; }
.sd-ex-ico { font-size: 16px; flex-shrink: 0; }
.sd-ex-name { font-size: 9px; font-weight: 500; color: var(--ink); }
.sd-ex-grp { font-size: 7px; color: var(--ink3); margin-top: 2px; text-transform: uppercase; letter-spacing: .08em; }
.sd-ex-body { border-top: 1px solid var(--b); padding: 8px 12px; }
.sd-series-table { width: 100%; border-collapse: collapse; font-size: 8px; }
.sd-series-table th { font-size: 6px; text-transform: uppercase; letter-spacing: .1em; color: var(--ink3); text-align: left; padding: 3px 0 5px; font-weight: 400; }
.sd-series-table td { padding: 4px 0; color: var(--ink2); vertical-align: middle; }
.sd-series-num { color: var(--ink3); }
.sd-pse-bar { display: inline-block; height: 3px; vertical-align: middle; border-radius: 1px; }

/* radar in detail */
.sd-radar-wrap { text-align: center; margin: 10px 0; position: relative; }

/* dim bars in detail */
.sd-dim-row { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; }
.sd-dim-lbl { font-size: 7px; color: rgba(200,160,96,.35); width: 52px; text-transform: uppercase; letter-spacing: .06em; }
.sd-dim-track { flex: 1; height: 4px; background: rgba(200,160,96,.07); border-radius: 2px; overflow: hidden; }
.sd-dim-fill { height: 100%; border-radius: 2px; }
.sd-dim-pct { font-size: 8px; width: 28px; text-align: right; }

/* ── UTILS ──────────────────────────────────────────── */
.hidden { display: none !important; }
.mt8 { margin-top: 8px; }
.mt16 { margin-top: 16px; }
.mt20 { margin-top: 20px; }

/* tooltip */
.chart-tip {
  position: absolute;
  background: #161410;
  border: 1px solid rgba(200,160,96,.3);
  color: rgba(200,160,96,.9);
  font-size: 8px;
  padding: 5px 9px;
  pointer-events: none;
  opacity: 0;
  transition: opacity .1s;
  white-space: nowrap;
  font-family: 'IBM Plex Mono', monospace;
  z-index: 10;
  border-radius: 1px;
  line-height: 1.6;
}
</style>
</head>
<body>

<div id="app">
  <!-- HEADER -->
  <div id="header">
    <div class="hd-logo">Momentum<span>PT Dashboard</span></div>
    <button id="hd-student-btn" onclick="openPicker()">
      <span id="hd-student-name">Carregando…</span>
      <span class="hd-chevron">▼</span>
    </button>
  </div>

  <!-- MAIN -->
  <div id="main">
    <!-- LOADING STATE -->
    <div id="loading">
      <div class="ld-mark">M</div>
      <div class="ld-text">Conectando ao Firebase…</div>
    </div>

    <!-- DASHBOARD VIEW -->
    <div id="view-dashboard" class="view"></div>

    <!-- SESSIONS VIEW -->
    <div id="view-sessions" class="view"></div>

    <!-- WORKOUT VIEW -->
    <div id="view-workout" class="view">
      <div class="wg-placeholder">
        <div class="wg-icon">⚡</div>
        <div class="wg-title">Treino Rápido</div>
        <div class="wg-desc">O gerador de treinos está disponível na versão desktop. Use o painel completo para prescrever sessões e mesociclos.</div>
      </div>
    </div>
  </div>

  <!-- BOTTOM NAV -->
  <nav id="bottom-nav">
    <button class="nav-tab active" data-view="dashboard" onclick="navTo('dashboard')">
      <span class="nt-icon">◈</span>
      <span class="nt-label">Dashboard</span>
    </button>
    <button class="nav-tab" data-view="sessions" onclick="navTo('sessions')">
      <span class="nt-icon">▤</span>
      <span class="nt-label">Sessões</span>
    </button>
    <button class="nav-tab" data-view="workout" onclick="navTo('workout')">
      <span class="nt-icon">⚡</span>
      <span class="nt-label">Treino</span>
    </button>
  </nav>
</div>

<!-- STUDENT PICKER -->
<div id="picker-overlay" onclick="closePicker(event)">
  <div class="picker-backdrop"></div>
  <div class="picker-sheet">
    <div class="picker-title">Selecionar Aluno</div>
    <div id="picker-list"></div>
  </div>
</div>

<!-- SESSION DETAIL -->
<div id="sd-overlay" onclick="closeSessDetailOuter(event)">
  <div id="sd-panel"></div>
</div>

<!-- FIREBASE SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>

<script>
'use strict';

// ═══════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════
const STUDENTS = {};
let currentStudentId = null;
let currentView = 'dashboard';

// ═══════════════════════════════════════════════════════
// FIREBASE BOOTSTRAP
// ═══════════════════════════════════════════════════════
async function bootstrapFromFirebase() {
  try {
    if (typeof db === 'undefined' || db === null) {
      hideLoading();
      showError('Firebase não disponível. Configure firebase-config.js.');
      return;
    }
    const [studentsSnap, sessionsSnap] = await Promise.all([
      db.collection('students').get(),
      db.collection('sessions').orderBy('date', 'asc').get()
    ]);
    if (studentsSnap.empty) {
      hideLoading();
      showError('Nenhum aluno encontrado no banco de dados.');
      return;
    }
    const sessions = sessionsSnap.docs.map(d => ({ id: d.id, ...d.data() }));
    Object.keys(STUDENTS).forEach(k => delete STUDENTS[k]);
    studentsSnap.forEach(doc => {
      const s = { id: doc.id, ...doc.data() };
      const sid = doc.id;
      const studentSessions = sessions.filter(sess => sess.student_id === sid);
      const weekMap = {};
      studentSessions.forEach(sess => {
        const wk = sess.semana || 1;
        if (!weekMap[wk]) weekMap[wk] = { n: wk, label: `Semana ${wk}`, sessoes: [] };
        weekMap[wk].sessoes.push({
          data: sess.date,
          tipo: sess.tipo || 'Sessão',
          indice: sess.indice_carga || 0,
          pse: sess.pse || 7,
          n: sess.n || 0.33,
          m: sess.m || 0.33,
          met: sess.met || 0.33,
          exercicios: (sess.exercicios || []).map(e => ({
            nome: e.nome || '', s: e.s || 3, r: e.r || 10, kg: e.kg || 0, pse: e.pse || 7
          }))
        });
      });
      const semanas = Object.values(weekMap).sort((a, b) => a.n - b.n);
      const momentum = (s.scores || {}).momentum || '—';
      STUDENTS[sid] = {
        name: s.name || sid,
        mesociclo: s.mesociclo || '—',
        nivel: s.nivel || '—',
        anamnese: s.anamnese || {},
        records: s.records || {},
        semanas,
        sessIndices: studentSessions.map(x => x.indice_carga || 0),
        pulsoData: buildPulsoData(semanas),
        scoreAtual: typeof momentum === 'number' ? momentum.toFixed(1) : String(momentum),
      };
    });
    console.log('[Momentum] Firebase carregado:', Object.keys(STUDENTS).length, 'alunos');
    hideLoading();
    const firstId = Object.keys(STUDENTS)[0];
    if (firstId) selectStudent(firstId);
  } catch (e) {
    hideLoading();
    showError('Erro ao conectar: ' + e.message);
    console.error('[Momentum] Erro Firebase:', e);
  }
}

}

// ═══════════════════════════════════════════════════════
// CALCULATIONS
// ═══════════════════════════════════════════════════════
function buildPulsoData(semanas) {
  return semanas.slice(-5).map(wk => {
    const ics  = wk.sessoes.map(s => s.indice);
    const pses = wk.sessoes.map(s => s.pse);
    const avgIC  = ics.reduce((a, b) => a + b, 0) / (ics.length || 1);
    const avgPSE = pses.reduce((a, b) => a + b, 0) / (pses.length || 1);
    return { c: Math.min(avgIC / 30000, 1), p: Math.min(avgPSE / 10, 1) };
  });
}

function epley1RM(kg, reps) {
  if (reps === 1) return kg;
  return kg * (1 + reps / 30);
}

function xRM(oneRM, reps) { return oneRM / (1 + reps / 30); }
function round05(v) { return Math.round(v * 2) / 2; }

function capNome(nome) {
  if (!nome) return '';
  if (/[A-ZÁÉÍÓÚÂÊÎÔÛÃÕÇ]/.test(nome.slice(1))) return nome;
  return nome.replace(/(?:^|\s|\/)(\S)/g, c => c.toUpperCase());
}

function makeInitials(name) {
  return name.split(' ').filter(Boolean).slice(0, 2).map(w => w[0].toUpperCase()).join('');
}

function calcRitmo(studentId) {
  const s = STUDENTS[studentId];
  if (!s || !s.semanas) return null;
  const allSess = [];
  s.semanas.slice(-4).forEach((sem, wi) => {
    sem.sessoes.forEach(sess => {
      if (sess.indice > 0 && sess.pse > 0)
        allSess.push({ score: sess.indice / sess.pse, week: wi });
    });
  });
  if (allSess.length < 4) return { estado: 'estavel', delta: 0, score: 0 };
  const half  = Math.floor(allSess.length / 2);
  const older = allSess.slice(0, half).map(s => s.score);
  const newer = allSess.slice(half).map(s => s.score);
  const avgOld = older.reduce((a, b) => a + b, 0) / older.length;
  const avgNew = newer.reduce((a, b) => a + b, 0) / newer.length;
  const delta = ((avgNew - avgOld) / avgOld) * 100;
  let estado;
  if (delta >= 10)       estado = 'alta';
  else if (delta >= -10) estado = 'estavel';
  else if (delta >= -20) estado = 'queda';
  else                   estado = 'critica';
  return { estado, delta: Math.round(delta), score: Math.round(avgNew) };
}

function calcRitmoRolling(studentId) {
  const s = STUDENTS[studentId];
  if (!s || !s.semanas || s.semanas.length < 2) return [];
  const WINDOW = 4;
  return s.semanas.map((_, wi) => {
    const start = Math.max(0, wi - WINDOW + 1);
    const windowWeeks = s.semanas.slice(start, wi + 1);
    const sessions = windowWeeks.flatMap(w =>
      w.sessoes.filter(sess => sess.indice > 0 && sess.pse > 0)
    );
    if (sessions.length < 2) return null;
    const avgIC  = sessions.reduce((a, b) => a + b.indice, 0) / sessions.length;
    const avgPSE = sessions.reduce((a, b) => a + b.pse, 0) / sessions.length;
    const ritmo  = avgIC / avgPSE;
    return {
      week: wi,
      label: wi < s.semanas.length - 1 ? `Sem ${wi + 1}` : 'Atual',
      ritmo: Math.round(ritmo),
      partial: (wi - start + 1) < WINDOW
    };
  });
}

const RITMO_CONFIG = {
  alta:    { label: 'Ritmo em alta',    color: '#608040', dot: '#7aaa50' },
  estavel: { label: 'Ritmo estável',    color: '#a07040', dot: '#c8a060' },
  queda:   { label: '⚠ Queda de ritmo', color: '#8a4020', dot: '#c86030' },

// ═══════════════════════════════════════════════════════
// CHARTS — LT (IC + PSE + Dimensional)
// ═══════════════════════════════════════════════════════
function renderLTCharts(s) {
  const allSess = s.semanas.flatMap(w => w.sessoes);
  if (allSess.length < 2) return;

  const weeks = s.semanas.map((w, wi) => {
    const sess = w.sessoes;
    const avg = key => sess.reduce((a, x) => a + (x[key] || 0), 0) / (sess.length || 1);
    return {
      label: `S${wi+1}`,
      fullLabel: w.label || `Semana ${wi+1}`,
      avgIC:  avg('indice'),
      avgPSE: avg('pse'),
      avgN:   avg('n'),
      avgM:   avg('m'),
      avgMet: avg('met'),
      n:      sess.length,
      empty:  sess.length === 0,
    };
  });

  const C_N   = '#8a7060';
  const C_M   = '#c8a060';
  const C_MET = '#607848';

  function makeCanvas(containerId, h) {
    const wrap = document.getElementById(containerId);
    if (!wrap) return null;
    wrap.innerHTML = '';
    wrap.style.position = 'relative';
    const canvas = document.createElement('canvas');
    canvas.height = h;
    canvas.style.cssText = 'display:block;width:100%;cursor:crosshair';
    wrap.appendChild(canvas);
    canvas.width = wrap.clientWidth || 360;
    return canvas;
  }

  function makeTip(wrap) {
    const tip = document.createElement('div');
    tip.className = 'chart-tip';
    wrap.appendChild(tip);
    return tip;
  }

  // ── IC + PSE Chart ────────────────────────────────────
  const cvIC  = makeCanvas('lt-ic-chart', 110);
  if (!cvIC) return;
  const tipIC = makeTip(cvIC.parentNode);
  const ctxIC = cvIC.getContext('2d');

  function drawIC() {
    const W = cvIC.width, H = cvIC.height;
    const PAD = { t: 18, r: 16, b: 28, l: 48 };
    const cW = W - PAD.l - PAD.r, cH = H - PAD.t - PAD.b;
    ctxIC.clearRect(0, 0, W, H);
    const nonEmpty = weeks.filter(w => !w.empty);
    if (nonEmpty.length < 2) return;
    const ICs  = nonEmpty.map(w => w.avgIC);
    const PSEs = nonEmpty.map(w => w.avgPSE);
    const loIC = Math.min(...ICs)*0.88, hiIC = Math.max(...ICs)*1.06;
    const loPSE = Math.min(...PSEs)-0.8, hiPSE = Math.max(...PSEs)+0.8;
    const sx    = i  => PAD.l + (i / (nonEmpty.length - 1)) * cW;
    const syIC  = v  => PAD.t + cH - ((v - loIC) / (hiIC - loIC || 1)) * cH;
    const syPSE = v  => PAD.t + cH - ((v - loPSE) / (hiPSE - loPSE || 1)) * cH;
    // Grid
    ctxIC.strokeStyle = 'rgba(200,160,96,.06)'; ctxIC.lineWidth = 1;
    [0, .5, 1].forEach(t => {
      const y = PAD.t + t * cH;
      ctxIC.beginPath(); ctxIC.moveTo(PAD.l, y); ctxIC.lineTo(W - PAD.r, y); ctxIC.stroke();
    });
    // Area
    const grad = ctxIC.createLinearGradient(0, PAD.t, 0, H - PAD.b);
    grad.addColorStop(0, 'rgba(200,160,96,.13)');
    grad.addColorStop(1, 'rgba(200,160,96,0)');
    ctxIC.beginPath();
    ctxIC.moveTo(sx(0), H - PAD.b);
    nonEmpty.forEach((w, i) => ctxIC.lineTo(sx(i), syIC(w.avgIC)));
    ctxIC.lineTo(sx(nonEmpty.length - 1), H - PAD.b);
    ctxIC.closePath(); ctxIC.fillStyle = grad; ctxIC.fill();
    // IC line
    ctxIC.beginPath(); ctxIC.strokeStyle = 'rgba(200,160,96,.8)'; ctxIC.lineWidth = 1.8; ctxIC.lineJoin = 'round';
    nonEmpty.forEach((w, i) => i === 0 ? ctxIC.moveTo(sx(i), syIC(w.avgIC)) : ctxIC.lineTo(sx(i), syIC(w.avgIC)));
    ctxIC.stroke();
    // PSE line
    ctxIC.beginPath(); ctxIC.strokeStyle = 'rgba(160,112,64,.5)'; ctxIC.lineWidth = 1.3; ctxIC.setLineDash([4, 3]);
    nonEmpty.forEach((w, i) => i === 0 ? ctxIC.moveTo(sx(i), syPSE(w.avgPSE)) : ctxIC.lineTo(sx(i), syPSE(w.avgPSE)));
    ctxIC.stroke(); ctxIC.setLineDash([]);
    // Dots
    nonEmpty.forEach((w, i) => {
      ctxIC.beginPath(); ctxIC.arc(sx(i), syIC(w.avgIC), 3.5, 0, Math.PI * 2);
      ctxIC.fillStyle = '#c8a060'; ctxIC.strokeStyle = '#f0ead8'; ctxIC.lineWidth = 1.5;
      ctxIC.fill(); ctxIC.stroke();
    });
    // Y labels
    ctxIC.font = '500 7px IBM Plex Mono,monospace'; ctxIC.fillStyle = 'rgba(200,160,96,.4)'; ctxIC.textAlign = 'right';
    [loIC, (loIC + hiIC) / 2, hiIC].forEach(v => ctxIC.fillText(Math.round(v/1000)+'k', PAD.l-5, syIC(v)+3));
    // X labels
    ctxIC.textAlign = 'center'; ctxIC.fillStyle = 'rgba(200,160,96,.35)'; ctxIC.font = '500 6.5px IBM Plex Mono,monospace';
    nonEmpty.forEach((w, i) => ctxIC.fillText(w.label, sx(i), H - 6));
    // Legend
    ctxIC.fillStyle = 'rgba(200,160,96,.7)'; ctxIC.fillRect(PAD.l, 6, 14, 2);
    ctxIC.fillStyle = 'rgba(200,160,96,.55)'; ctxIC.font = '500 6.5px IBM Plex Mono,monospace'; ctxIC.textAlign = 'left';
    ctxIC.fillText('IC', PAD.l + 17, 10);
    ctxIC.strokeStyle = 'rgba(160,112,64,.5)'; ctxIC.lineWidth = 1.3; ctxIC.setLineDash([4, 3]);
    ctxIC.beginPath(); ctxIC.moveTo(PAD.l+36, 8); ctxIC.lineTo(PAD.l+50, 8); ctxIC.stroke(); ctxIC.setLineDash([]);
    ctxIC.fillStyle = 'rgba(160,112,64,.5)'; ctxIC.fillText('PSE', PAD.l+53, 10);
    cvIC._weeks = nonEmpty; cvIC._sx = sx; cvIC._syIC = syIC; cvIC._PAD = PAD;
  }
  drawIC();

  cvIC.addEventListener('mousemove', e => {
    const rect = cvIC.getBoundingClientRect();
    const mx = (e.clientX - rect.left) * (cvIC.width / rect.width);
    const ws = cvIC._weeks; if (!ws) return;
    let closest = 0, minD = Infinity;
    ws.forEach((w, i) => { const d = Math.abs(cvIC._sx(i) - mx); if (d < minD) { minD = d; closest = i; } });
    if (minD > 30) { tipIC.style.opacity = 0; return; }
    const w = ws[closest];
    tipIC.innerHTML = `<strong>${w.fullLabel}</strong><br>IC ${Math.round(w.avgIC).toLocaleString('pt-BR')} · PSE ${w.avgPSE.toFixed(1)} · ${w.n} sessão${w.n !== 1 ? 'es' : ''}`;
    const x = cvIC._sx(closest) * (rect.width / cvIC.width);
    const y = cvIC._syIC(w.avgIC) * (rect.height / cvIC.height);
    tipIC.style.left = Math.min(x + 8, rect.width - 180) + 'px';
    tipIC.style.top  = (y - 18) + 'px';
    tipIC.style.opacity = 1;
  });
  cvIC.addEventListener('mouseleave', () => { tipIC.style.opacity = 0; });

  // ── Highlights ────────────────────────────────────────
  const nonEmpty = weeks.filter(w => !w.empty);
  const ICs = nonEmpty.map(w => w.avgIC);
  const trend = ICs[ICs.length-1] - ICs[0];
  const trendPct = ((trend / (ICs[0] || 1)) * 100).toFixed(0);
  const bestWeek = nonEmpty.reduce((a, b) => a.avgIC > b.avgIC ? a : b);
  const maxStreak = (() => {
    let streak = 1, max = 1;
    for (let i = 1; i < ICs.length; i++) { if (ICs[i] > ICs[i-1]) streak++; else streak = 1; max = Math.max(max, streak); }
    return max;
  })();
  const dimDom = nonEmpty.map(w => {
    const d = {N:w.avgN, M:w.avgM, Met:w.avgMet};
    return Object.entries(d).sort((a, b) => b[1] - a[1])[0][0];
  });
  const dimCount = dimDom.reduce((acc, d) => { acc[d] = (acc[d]||0)+1; return acc; }, {});
  const domDim = Object.entries(dimCount).sort((a, b) => b[1] - a[1])[0];
  const dimLabel = {N:'Neural', M:'Mecânica', Met:'Metabólica'};
  const dimColor = {N: C_N, M: C_M, Met: C_MET};
  const hlEl = document.getElementById('lt-highlights');
  if (hlEl) hlEl.innerHTML = `
    <div class="lt-hl-row">
      <div class="lt-hl ${trend >= 0 ? 'pos' : 'neg'}">
        <div class="lt-hl-val">${trend >= 0 ? '+' : ''}${trendPct}%</div>
        <div class="lt-hl-lbl">Progressão IC</div>
        <div class="lt-hl-sub">${trend >= 0 ? 'Crescimento' : 'Queda'} início→fim</div>
      </div>
      <div class="lt-hl pos">
        <div class="lt-hl-val">${bestWeek.label}</div>
        <div class="lt-hl-lbl">Melhor semana</div>
        <div class="lt-hl-sub">IC ${Math.round(bestWeek.avgIC).toLocaleString('pt-BR')}</div>
      </div>
      <div class="lt-hl">
        <div class="lt-hl-val">${maxStreak}</div>
        <div class="lt-hl-lbl">Sequência</div>
        <div class="lt-hl-sub">semanas crescendo</div>
      </div>
      <div class="lt-hl" style="color:${domDim ? dimColor[domDim[0]] : 'var(--copper)'}">
        <div class="lt-hl-val">${domDim ? dimLabel[domDim[0]] : '—'}</div>
        <div class="lt-hl-lbl">Dimensão dom.</div>
        <div class="lt-hl-sub">${domDim ? domDim[1]+' de '+nonEmpty.length+' sem.' : '—'}</div>
      </div>
    </div>`;

  // ── Dimensional Chart ─────────────────────────────────
  const cvDim = makeCanvas('lt-dim-chart', 100);
  if (!cvDim) return;
  const tipDim = makeTip(cvDim.parentNode);
  const ctxDim = cvDim.getContext('2d');

  function drawDim() {
    const W = cvDim.width, H = cvDim.height;
    const PAD = { t: 18, r: 16, b: 28, l: 44 };
    const cW = W - PAD.l - PAD.r, cH = H - PAD.t - PAD.b;
    ctxDim.clearRect(0, 0, W, H);
    const ne = weeks.filter(w => !w.empty);
    if (ne.length < 2) return;
    const allVals = ne.flatMap(w => [w.avgN, w.avgM, w.avgMet]);
    const lo = Math.max(0, Math.min(...allVals) - 0.05);
    const hi = Math.min(1, Math.max(...allVals) + 0.05);
    const sx = i => PAD.l + (i / (ne.length - 1)) * cW;
    const sy = v => PAD.t + cH - ((v - lo) / (hi - lo || 1)) * cH;
    ctxDim.strokeStyle = 'rgba(200,160,96,.06)'; ctxDim.lineWidth = 1;
    [0, .5, 1].forEach(t => {
      const y = PAD.t + t * cH;
      ctxDim.beginPath(); ctxDim.moveTo(PAD.l, y); ctxDim.lineTo(W - PAD.r, y); ctxDim.stroke();
    });
    const series = [
      { key: 'avgN',   color: C_N,   label: 'Neural' },
      { key: 'avgM',   color: C_M,   label: 'Mecânica' },
      { key: 'avgMet', color: C_MET, label: 'Metab.' },
    ];
    series.forEach(({ key, color }) => {
      const grad = ctxDim.createLinearGradient(0, PAD.t, 0, H - PAD.b);
      grad.addColorStop(0, color + '28'); grad.addColorStop(1, color + '00');
      ctxDim.beginPath(); ctxDim.moveTo(sx(0), H - PAD.b);
      ne.forEach((w, i) => ctxDim.lineTo(sx(i), sy(w[key])));
      ctxDim.lineTo(sx(ne.length-1), H-PAD.b); ctxDim.closePath();
      ctxDim.fillStyle = grad; ctxDim.fill();
      ctxDim.beginPath(); ctxDim.strokeStyle = color; ctxDim.lineWidth = 1.6; ctxDim.lineJoin = 'round';
      ne.forEach((w, i) => i === 0 ? ctxDim.moveTo(sx(i), sy(w[key])) : ctxDim.lineTo(sx(i), sy(w[key])));
      ctxDim.stroke();
      ne.forEach((w, i) => {
        ctxDim.beginPath(); ctxDim.arc(sx(i), sy(w[key]), 2.8, 0, Math.PI*2);
        ctxDim.fillStyle = color; ctxDim.strokeStyle = '#f0ead8'; ctxDim.lineWidth = 1.2;
        ctxDim.fill(); ctxDim.stroke();
      });
    });
    ctxDim.font = '500 7px IBM Plex Mono,monospace'; ctxDim.fillStyle = 'rgba(200,160,96,.4)'; ctxDim.textAlign = 'right';
    [lo, (lo+hi)/2, hi].forEach(v => ctxDim.fillText(Math.round(v*100)+'%', PAD.l-4, sy(v)+3));
    ctxDim.textAlign = 'center'; ctxDim.font = '500 6.5px IBM Plex Mono,monospace'; ctxDim.fillStyle = 'rgba(200,160,96,.35)';
    ne.forEach((w, i) => ctxDim.fillText(w.label, sx(i), H-6));
    series.forEach(({ color, label }, i) => {
      const x = PAD.l + i * 62;
      ctxDim.fillStyle = color; ctxDim.fillRect(x, 5, 12, 2);
      ctxDim.font = '500 6.5px IBM Plex Mono,monospace'; ctxDim.textAlign = 'left';
      ctxDim.fillStyle = color + 'cc'; ctxDim.fillText(label, x+15, 10);
    });
    cvDim._weeks = ne; cvDim._sx = sx; cvDim._sy = sy; cvDim._series = series;
  }
  drawDim();

  cvDim.addEventListener('mousemove', e => {
    const rect = cvDim.getBoundingClientRect();
    const mx = (e.clientX - rect.left) * (cvDim.width / rect.width);
    const ws = cvDim._weeks; if (!ws) return;
    let closest = 0, minD = Infinity;
    ws.forEach((w, i) => { const d = Math.abs(cvDim._sx(i) - mx); if (d < minD) { minD = d; closest = i; } });
    if (minD > 30) { tipDim.style.opacity = 0; return; }
    const w = ws[closest];
    tipDim.innerHTML = `<strong>${w.fullLabel}</strong><br>`+
      `<span style="color:${C_N}">N ${(w.avgN*100).toFixed(0)}%</span>  `+
      `<span style="color:${C_M}">M ${(w.avgM*100).toFixed(0)}%</span>  `+
      `<span style="color:${C_MET}">Met ${(w.avgMet*100).toFixed(0)}%</span>`;
    tipDim.style.left = (cvDim._sx(closest) * (rect.width/cvDim.width) + 8) + 'px';
    tipDim.style.top  = '2px';
    tipDim.style.opacity = 1;
  });
  cvDim.addEventListener('mouseleave', () => { tipDim.style.opacity = 0; });
}

// ═══════════════════════════════════════════════════════
// CHARTS — Ritmo Rolling
// ═══════════════════════════════════════════════════════
function renderRitmoRollingChart(studentId) {
  const cv = document.getElementById('ritmo-rolling-chart');
  if (!cv) return;
  const rolling = calcRitmoRolling(studentId);
  const valid = rolling.filter(p => p !== null);
  if (valid.length < 2) return;

  const W = cv.clientWidth || 360, H = 80;
  cv.width  = W * devicePixelRatio;
  cv.height = H * devicePixelRatio;
  const ctx = cv.getContext('2d');
  ctx.scale(devicePixelRatio, devicePixelRatio);

  const vals = valid.map(p => p.ritmo);
  const max  = Math.max(...vals) * 1.12;
  const min  = Math.min(...vals) * 0.88;
  const range = max - min || 1;
  const pad  = { t: 8, b: 20, l: 6, r: 6 };
  const cW   = W - pad.l - pad.r, cH = H - pad.t - pad.b;

  const sx = i => pad.l + (i / (valid.length - 1)) * cW;
  const sy = v => pad.t + cH - ((v - min) / range) * cH;

  ctx.strokeStyle = 'rgba(200,160,96,.07)'; ctx.lineWidth = 1;
  [.25, .5, .75, 1].forEach(f => {
    const y = pad.t + cH * (1 - f);
    ctx.beginPath(); ctx.moveTo(pad.l, y); ctx.lineTo(W - pad.r, y); ctx.stroke();
  });

  const grad = ctx.createLinearGradient(0, pad.t, 0, H);
  grad.addColorStop(0, 'rgba(200,160,96,.18)');
  grad.addColorStop(1, 'rgba(200,160,96,0)');
  ctx.beginPath();
  valid.forEach((p, i) => i === 0 ? ctx.moveTo(sx(i), sy(p.ritmo)) : ctx.lineTo(sx(i), sy(p.ritmo)));
  ctx.lineTo(sx(valid.length-1), H); ctx.lineTo(sx(0), H); ctx.closePath();
  ctx.fillStyle = grad; ctx.fill();

  let inPartial = null;
  valid.forEach((p, i) => {
    if (i === 0) { ctx.beginPath(); ctx.moveTo(sx(i), sy(p.ritmo)); inPartial = p.partial; return; }
    if (p.partial !== inPartial) {
      ctx.strokeStyle = 'rgba(200,160,96,' + (inPartial ? '.4' : '.85') + ')';
      ctx.lineWidth = inPartial ? 1 : 1.8;
      if (inPartial) ctx.setLineDash([3, 3]); else ctx.setLineDash([]);
      ctx.stroke();
      ctx.beginPath(); ctx.moveTo(sx(i-1), sy(valid[i-1].ritmo));
      inPartial = p.partial;
    }
    ctx.lineTo(sx(i), sy(p.ritmo));
  });
  ctx.strokeStyle = 'rgba(200,160,96,' + (inPartial ? '.4' : '.85') + ')';
  ctx.lineWidth = inPartial ? 1 : 1.8;
  if (inPartial) ctx.setLineDash([3, 3]); else ctx.setLineDash([]);
  ctx.stroke(); ctx.setLineDash([]);

  valid.forEach((p, i) => {
    ctx.beginPath(); ctx.arc(sx(i), sy(p.ritmo), p.partial ? 2 : 3, 0, Math.PI*2);
    ctx.fillStyle = p.partial ? 'rgba(200,160,96,.4)' : 'var(--copper)'; ctx.fill();
  });

  ctx.fillStyle = 'rgba(200,160,96,.35)'; ctx.font = '6px IBM Plex Mono';
  valid.forEach((p, i) => {
    if (valid.length <= 8 || i % Math.ceil(valid.length/8) === 0 || i === valid.length-1)
      ctx.fillText(p.label, sx(i) - 10, H - 4);
  });
  ctx.fillStyle = 'rgba(200,160,96,.3)'; ctx.font = '7px IBM Plex Mono';
  ctx.fillText('— janela 4 sem.   - - parcial', pad.l, pad.t - 1);

  const tip = document.getElementById('ritmo-rolling-tip');
  cv.onmousemove = function(e) {
    const rect = cv.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const i = Math.round((mx - pad.l) / cW * (valid.length - 1));
    if (i < 0 || i >= valid.length) return;
    const p = valid[i];
    tip.style.opacity = '1';
    tip.style.left = Math.min(mx + 8, W - 160) + 'px';
    tip.style.top  = (sy(p.ritmo) - 28) + 'px';
    tip.textContent = p.label + ': Ritmo ' + p.ritmo + (p.partial ? ' (parcial)' : '');
  };
  cv.onmouseleave = () => tip.style.opacity = '0';
}

// ═══════════════════════════════════════════════════════
// CHARTS — Radar
// ═══════════════════════════════════════════════════════
function drawRadar(canvas, series) {
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height, cx = W/2, cy = H/2, R = Math.min(W,H)/2 - 26;
  const N = 5;
  ctx.clearRect(0, 0, W, H);
  for (let ring = 1; ring <= 5; ring++) {
    ctx.beginPath();
    for (let i = 0; i < N; i++) {
      const a = (i/N)*Math.PI*2 - Math.PI/2, r = R*ring/5;
      i === 0 ? ctx.moveTo(cx+r*Math.cos(a), cy+r*Math.sin(a)) : ctx.lineTo(cx+r*Math.cos(a), cy+r*Math.sin(a));
    }
    ctx.closePath(); ctx.strokeStyle = 'rgba(200,160,96,.07)'; ctx.lineWidth = 1; ctx.stroke();
  }
  for (let i = 0; i < N; i++) {
    const a = (i/N)*Math.PI*2 - Math.PI/2;
    ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(cx+R*Math.cos(a), cy+R*Math.sin(a));
    ctx.strokeStyle = 'rgba(200,160,96,.08)'; ctx.lineWidth = 1; ctx.stroke();
  }
  series.forEach(s => {
    ctx.globalAlpha = s.opacity || 1;
    ctx.beginPath();
    for (let i = 0; i < N; i++) {
      const a = (i/N)*Math.PI*2 - Math.PI/2, r = R*(s.vals[i]||0)/10;
      i === 0 ? ctx.moveTo(cx+r*Math.cos(a), cy+r*Math.sin(a)) : ctx.lineTo(cx+r*Math.cos(a), cy+r*Math.sin(a));
    }
    ctx.closePath();
    ctx.fillStyle = s.color+'18'; ctx.fill();
    ctx.strokeStyle = s.color; ctx.lineWidth = 1.5; ctx.stroke();
    for (let i = 0; i < N; i++) {
      const a = (i/N)*Math.PI*2 - Math.PI/2, r = R*(s.vals[i]||0)/10;
      ctx.beginPath(); ctx.arc(cx+r*Math.cos(a), cy+r*Math.sin(a), 2.5, 0, Math.PI*2);
      ctx.fillStyle = s.color; ctx.fill();
    }
    ctx.globalAlpha = 1;
  });
  const labels = ['Neural', 'Mecân.', 'Metab.', 'Técn.', 'Ritmo'];
  ctx.font = '400 8px IBM Plex Mono,monospace'; ctx.textAlign = 'center';
  for (let i = 0; i < N; i++) {
    const a = (i/N)*Math.PI*2 - Math.PI/2, lr = R + 16;
    ctx.fillStyle = 'rgba(200,160,96,.3)';
    ctx.fillText(labels[i], cx + lr*Math.cos(a), cy + lr*Math.sin(a) + 3);
  }
}

// ═══════════════════════════════════════════════════════
// SESSION DETAIL
// ═══════════════════════════════════════════════════════
function openSessDetail(sid, wi, si) {
  const s = STUDENTS[sid];
  const week = s.semanas[wi];
  const sess = week.sessoes[si];
  const allSess = s.semanas.flatMap(w => w.sessoes);
  const mean = allSess.reduce((a, b) => a + b.indice, 0) / allSess.length;
  const totalIC = sess.indice;
  const vsAvg = ((totalIC - mean) / mean * 100).toFixed(0);
  const vsSign = vsAvg >= 0 ? '+' : '';

  const radarVals = [
    Math.min(sess.n * 10, 10),
    Math.min(sess.m * 10, 10),
    Math.min(sess.met * 10, 10),
    5,
    Math.min(totalIC / mean * 5, 10)
  ];

  const panel = document.getElementById('sd-panel');
  panel.innerHTML = `
    <div class="sd-header">
      <div>
        <div class="sd-header-tipo">${week.label}</div>
        <div class="sd-header-name">${sess.tipo}</div>
        <div class="sd-header-meta">${sess.data} · PSE ${sess.pse} · ${sess.exercicios.length} exercícios</div>
      </div>
      <button class="sd-close" onclick="closeSessDetail()">×</button>
    </div>
    <div class="sd-body">
      <div class="sd-ic-row">
        <div>
          <div class="sd-ic-lbl">Índice de Carga</div>
          <div class="sd-ic-val">${totalIC.toLocaleString('pt-BR')}</div>
        </div>
        <div class="sd-ic-vs" style="color:${vsAvg >= 0 ? 'var(--z-leve)' : '#c86030'}">${vsSign}${vsAvg}% vs média</div>
      </div>

      <div class="sd-sec-lbl">Perfil da Sessão</div>
      <div class="sd-radar-wrap">
        <canvas id="sd-radar" width="200" height="200"></canvas>
      </div>
      <div style="margin-top:10px">
        ${[['Neural',sess.n,'#8a6030'],['Mecânica',sess.m,'#a07040'],['Metabólica',sess.met,'#608040']].map(([l,v,c]) => `
          <div class="sd-dim-row">
            <div class="sd-dim-lbl">${l}</div>
            <div class="sd-dim-track"><div class="sd-dim-fill" style="width:${(v*100).toFixed(0)}%;background:${c}"></div></div>
            <div class="sd-dim-pct" style="color:${c}">${(v*100).toFixed(0)}</div>
          </div>
        `).join('')}
      </div>

      <div class="sd-sec-lbl">Exercícios</div>
      ${sess.exercicios.map((e, idx) => {
        const series = Array.from({length: e.s}, (_, si) => {
          const f = si / Math.max(e.s - 1, 1);
          const kgVar  = e.kg > 0 ? Math.round((e.kg*(1-f*0.04))/2.5)*2.5 : 0;
          const repsVar = Math.max(1, Math.round(e.r*(1-f*0.08)));
          const pseVar  = parseFloat(Math.min(10, Math.max(5, e.pse + f*0.8)).toFixed(1));
          return { kg: kgVar, reps: repsVar, pse: pseVar };
        });
        return `
          <div class="sd-ex-card">
            <div class="sd-ex-head">
              <div class="sd-ex-ico">💪</div>
              <div style="flex:1">
                <div class="sd-ex-name">${capNome(e.nome)}</div>
                <div class="sd-ex-grp">${e.s} séries · ${e.r} reps · ${e.kg > 0 ? e.kg+'kg' : 'Livre'}</div>
              </div>
            </div>
            <div class="sd-ex-body">
              <table class="sd-series-table">
                <thead><tr><th>Série</th><th>Carga</th><th>Reps</th><th>PSE</th><th>Esforço</th></tr></thead>
                <tbody>
                  ${series.map((sr, si) => `
                    <tr>
                      <td class="sd-series-num">${si+1}</td>
                      <td><strong>${sr.kg > 0 ? sr.kg+'kg' : 'Livre'}</strong></td>
                      <td>${sr.reps}</td>
                      <td style="color:${sr.pse>=8.5?'#c86030':sr.pse>=7?'#a07040':'#608040'}">${sr.pse}</td>
                      <td><span class="sd-pse-bar" style="width:${(sr.pse/10*48).toFixed(0)}px;background:${sr.pse>=8.5?'#c86030':sr.pse>=7?'#a07040':'#608040'}"></span></td>
                    </tr>
                  `).join('')}
                </tbody>
              </table>
            </div>
          </div>
        `;
      }).join('')}
    </div>
  `;

  document.getElementById('sd-overlay').classList.add('open');
  requestAnimationFrame(() => {
    const canvas = document.getElementById('sd-radar');
    if (canvas) drawRadar(canvas, [{ vals: radarVals, color: '#c8a060' }]);
  });
}

function closeSessDetail() {
  document.getElementById('sd-overlay').classList.remove('open');
}

function closeSessDetailOuter(e) {
  if (e.target.id === 'sd-overlay') closeSessDetail();
}
