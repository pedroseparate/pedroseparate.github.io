<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Momentum Landing Page</title>
    <link rel="stylesheet" href="styles.css">
    <script src="scripts.js" defer></script>
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#features">Features</a></li>
                <li><a href="#quiz">Quiz</a></li>
                <li><a href="#analytics">Analytics</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section id="hero">
            <h1>Welcome to Momentum</h1>
            <p>Your productivity companion</p>
        </section>
        <section id="features">
            <h2>Features</h2>
            <div class="feature">Radar charts for performance tracking</div>
            <div class="feature">Interactive quizzes for self-assessment</div>
        </section>
        <section id="quiz">
            <h2>Take the Quiz</h2>
            <button id="quizButton">Start Quiz</button>
        </section>
        <section id="analytics">
            <h2>Analytics</h2>
            <div id="analyticsChart"></div>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Momentum</p>
    </footer>

</html>
